// ============================================================================
// UTILITY FUNCTIONS
// ============================================================================
const Utils = {
    lerp: (a, b, t) => a + (b - a) * t,
    
    clamp: (val, min, max) => Math.max(min, Math.min(max, val)),
    
    map: (value, inMin, inMax, outMin, outMax) => {
        return outMin + (outMax - outMin) * ((value - inMin) / (inMax - inMin));
    },
    
    easeOutQuad: (t) => t * (2 - t),
    
    easeInOutQuad: (t) => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t,
    
    hexToRgb: (hex) => {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
            r: parseInt(result[1], 16),
            g: parseInt(result[2], 16),
            b: parseInt(result[3], 16)
        } : null;
    },
    
    rgbToString: (r, g, b, a = 1) => `rgba(${r}, ${g}, ${b}, ${a})`,
    
    formatTime: (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    },
    
    formatScore: (score) => {
        return score.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }
};

// ============================================================================
// 3D PERSPECTIVE ENGINE
// ============================================================================
class PerspectiveEngine {
    constructor() {
        this.canvas = null;
        this.ctx = null;
        this.width = 0;
        this.height = 0;
        this.centerX = 0;
        this.horizonY = 0;
        this.receptorY = 0;
        
        this.trackWidthNear = CONFIG.TRACK_WIDTH;
        this.trackWidthFar = 20;
        this.viewDistance = CONFIG.VIEW_DISTANCE;
        
        this.setup();
    }
    
    setup() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        window.addEventListener('resize', () => this.resize());
    }
    
    resize() {
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        
        this.centerX = this.width / 2;
        this.horizonY = this.height * CONFIG.HORIZON_Y;
        this.receptorY = this.height - CONFIG.RECEPTOR_Y_OFFSET;
    }
    
    // Project 3D world coordinates to 2D screen
    project(x, y, z) {
        // z: 0 = at camera/receptor, higher = further away
        const t = Utils.clamp(z / this.viewDistance, 0, 1);
        
        // Y interpolation from horizon to receptor
        const screenY = Utils.lerp(this.horizonY, this.receptorY, 1 - t);
        
        // Track width interpolation
        const trackWidth = Utils.lerp(this.trackWidthFar, this.trackWidthNear, 1 - t);
        
        // X position based on track width
        const screenX = this.centerX + x * (trackWidth / CONFIG.TRACK_WIDTH);
        
        // Scale factor for notes (far = small, near = large)
        const scale = Math.pow(1 - t, 0.65) * 0.85 + 0.15;
        
        return { x: screenX, y: screenY, scale: scale, trackWidth: trackWidth };
    }
    
    // Get lane X position at given depth
    getLaneX(lane, depth = 0) {
        const laneOffset = (lane - 1.5) * (CONFIG.TRACK_WIDTH / 4);
        return this.project(laneOffset, 0, depth);
    }
    
    // Get receptor positions
    getReceptors() {
        const positions = [];
        for (let i = 0; i < CONFIG.LANE_COUNT; i++) {
            positions.push(this.getLaneX(i, 0));
        }
        return positions;
    }
}

// ============================================================================
// PARTICLE SYSTEM
// ============================================================================
class ParticleSystem {
    constructor() {
        this.canvas = document.getElementById('bgCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.particles = [];
        this.resize();
        window.addEventListener('resize', () => this.resize());
    }
    
    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
    }
    
    emit(x, y, color, count = 10, spread = 5) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * spread + 2;
            this.particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 3,
                life: 1,
                decay: 0.015 + Math.random() * 0.015,
                size: 2 + Math.random() * 4,
                color: color
            });
        }
    }
    
    emitTrail(x, y, color) {
        this.particles.push({
            x: x + (Math.random() - 0.5) * 20,
            y: y,
            vx: (Math.random() - 0.5) * 0.5,
            vy: -Math.random() * 2 - 1,
            life: 1,
            decay: 0.008 + Math.random() * 0.005,
            size: 1 + Math.random() * 2,
            color: color
        });
    }
    
    update() {
        // Fade background
        this.ctx.fillStyle = 'rgba(2, 2, 8, 0.15)';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        // Update particles
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.1;
            p.vx *= 0.98;
            p.life -= p.decay;
            
            if (p.life <= 0) {
                this.particles.splice(i, 1);
                continue;
            }
            
            this.ctx.globalAlpha = p.life * 0.8;
            this.ctx.fillStyle = p.color;
            this.ctx.beginPath();
            this.ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            this.ctx.fill();
        }
        this.ctx.globalAlpha = 1;
        
        // Ambient particles
        if (this.particles.length < 50 && Math.random() < 0.05) {
            const x = Math.random() * this.canvas.width;
            const hue = Math.random() > 0.5 ? 190 : 320;
            this.particles.push({
                x, y: this.canvas.height + 10,
                vx: (Math.random() - 0.5) * 0.3,
                vy: -Math.random() * 1.5 - 0.5,
                life: 1,
                decay: 0.003,
                size: 1 + Math.random() * 1.5,
                color: `hsl(${hue}, 100%, 60%)`
            });
        }
    }
}

// ============================================================================
// AUDIO ENGINE
// ============================================================================
class AudioEngine {
    constructor() {
        this.context = null;
        this.analyser = null;
        this.source = null;
        this.audioBuffer = null;
        this.duration = 0;
        this.sampleRate = 44100;
        this.bpm = 120;
        this.beats = [];
        this.gainNode = null;
        this.isPlaying = false;
        this.startTime = 0;
        this.pauseTime = 0;
    }
    
    async init() {
        this.context = new (window.AudioContext || window.webkitAudioContext)();
        this.analyser = this.context.createAnalyser();
        this.analyser.fftSize = 256;
        this.gainNode = this.context.createGain();
        this.gainNode.connect(this.analyser);
        this.analyser.connect(this.context.destination);
    }
    
    async loadAudio(file) {
        const arrayBuffer = await file.arrayBuffer();
        this.audioBuffer = await this.context.decodeAudioData(arrayBuffer);
        this.duration = this.audioBuffer.duration;
        this.sampleRate = this.audioBuffer.sampleRate;
    }
    
    async analyze(onProgress) {
        const channelData = this.audioBuffer.getChannelData(0);
        
        onProgress(10, 'Detecting BPM...');
        this.bpm = this.detectBPM(channelData);
        
        onProgress(30, 'Generating beat map...');
        this.generateBeats(channelData);
        
        onProgress(70, 'Calculating patterns...');
        await this.sleep(200);
        
        onProgress(100, 'Ready!');
        
        return { bpm: this.bpm, duration: this.duration, beats: this.beats };
    }
    
    detectBPM(channelData) {
        const sampleRate = this.sampleRate;
        const windowSize = Math.floor(sampleRate * 0.01); // 10ms windows
        const energies = [];
        
        // Calculate energy for each window
        for (let i = 0; i < channelData.length - windowSize; i += windowSize) {
            let energy = 0;
            for (let j = 0; j < windowSize; j++) {
                energy += channelData[i + j] * channelData[i + j];
            }
            energies.push(Math.sqrt(energy / windowSize));
        }
        
        // Find peaks in energy
        const mean = energies.reduce((a, b) => a + b, 0) / energies.length;
        const threshold = mean * 1.5;
        const peaks = [];
        
        for (let i = 1; i < energies.length - 1; i++) {
            if (energies[i] > threshold && 
                energies[i] > energies[i - 1] && 
                energies[i] > energies[i + 1]) {
                peaks.push(i);
            }
        }
        
        // Calculate intervals between peaks
        const intervals = [];
        for (let i = 1; i < peaks.length; i++) {
            const intervalSamples = peaks[i] - peaks[i - 1];
            const intervalSeconds = intervalSamples * windowSize / sampleRate;
            const bpm = 60 / intervalSeconds;
            
            if (bpm >= 60 && bpm <= 200) {
                intervals.push(bpm);
            }
        }
        
        // Return median BPM or default
        if (intervals.length === 0) return 120;
        
        intervals.sort((a, b) => a - b);
        return Math.round(intervals[Math.floor(intervals.length / 2)]);
    }
    
    generateBeats(channelData) {
        const beatInterval = 60 / this.bpm;
        this.beats = [];
        
        // Generate beats at each interval
        for (let time = beatInterval * 0.5; time < this.duration - 1; time += beatInterval) {
            const sampleIndex = Math.floor(time * this.sampleRate);
            const windowSize = Math.floor(0.05 * this.sampleRate);
            
            let sum = 0;
            for (let i = 0; i < windowSize && sampleIndex + i < channelData.length; i++) {
                sum += Math.abs(channelData[sampleIndex + i]);
            }
            
            const volume = sum / windowSize;
            const beatNumber = Math.round(time / beatInterval);
            
            this.beats.push({
                time: time,
                volume: volume,
                isDownbeat: beatNumber % 4 === 0,
                isHalfBeat: beatNumber % 2 === 0
            });
        }
    }
    
    play() {
        if (this.source) {
            this.source.stop();
        }
        
        this.source = this.context.createBufferSource();
        this.source.buffer = this.audioBuffer;
        this.source.connect(this.gainNode);
        this.source.start(0);
        this.startTime = this.context.currentTime;
        this.isPlaying = true;
        
        this.source.onended = () => {
            this.isPlaying = false;
        };
    }
    
    stop() {
        if (this.source) {
            this.source.stop();
            this.source = null;
        }
        this.isPlaying = false;
    }
    
    pause() {
        if (this.isPlaying) {
            this.pauseTime = this.getCurrentTime();
            this.stop();
        }
    }
    
    resume() {
        if (this.pauseTime > 0) {
            this.source = this.context.createBufferSource();
            this.source.buffer = this.audioBuffer;
            this.source.connect(this.gainNode);
            this.source.start(0, this.pauseTime);
            this.startTime = this.context.currentTime - this.pauseTime;
            this.isPlaying = true;
        }
    }
    
    getCurrentTime() {
        if (!this.isPlaying || !this.startTime) return 0;
        return this.context.currentTime - this.startTime;
    }
    
    setVolume(volume) {
        if (this.gainNode) {
            this.gainNode.gain.value = volume;
        }
    }
    
    sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
}

// ============================================================================
// CHART GENERATOR
// ============================================================================
class ChartGenerator {
    constructor(audioEngine, difficulty) {
        this.audio = audioEngine;
        this.settings = CONFIG.DIFFICULTY[difficulty];
    }
    
    generate() {
        const notes = [];
        const lastNoteTime = [-999, -999, -999, -999];
        
        for (const beat of this.audio.beats) {
            // Skip based on density
            if (Math.random() > this.settings.density) continue;
            
            // Try to find an available lane
            const availableLanes = [];
            for (let lane = 0; lane < 4; lane++) {
                if (beat.time - lastNoteTime[lane] >= this.settings.minGap) {
                    availableLanes.push(lane);
                }
            }
            
            if (availableLanes.length === 0) continue;
            
            // Pick random lane
            const lane = availableLanes[Math.floor(Math.random() * availableLanes.length)];
            
            // Determine note type
            let noteType = 'tap';
            const rand = Math.random();
            
            if (beat.volume > 0.15 && rand < this.settings.holdChance) {
                noteType = 'hold';
            } else if (beat.isDownbeat && rand < this.settings.holdChance + this.settings.flickChance) {
                noteType = 'flick';
            }
            
            // Create note
            const note = {
                time: beat.time,
                lane: lane,
                type: noteType,
                hit: false,
                missed: false,
                holdDuration: 0,
                flickDirection: 0
            };
            
            // Set hold duration
            if (noteType === 'hold') {
                note.holdDuration = 0.3 + Math.random() * 0.6;
            }
            
            // Set flick direction
            if (noteType === 'flick') {
                note.flickDirection = Math.random() > 0.5 ? 1 : -1;
            }
            
            notes.push(note);
            lastNoteTime[lane] = beat.time;
        }
        
        // Sort by time
        notes.sort((a, b) => a.time - b.time);
        
        return notes;
    }
}

// ============================================================================
// NOTE RENDERER - ARCAEA STYLE
// ============================================================================
class NoteRenderer {
    constructor(ctx, perspective) {
        this.ctx = ctx;
        this.persp = perspective;
    }
    
    render(note, currentTime) {
        const timeDiff = note.time - currentTime;
        
        // Skip if too far or already past
        if (timeDiff > 2.5 || timeDiff < -0.5) return;
        
        // Calculate depth (time diff to depth)
        const depth = Utils.clamp(timeDiff * 800, 0, this.persp.viewDistance);
        
        // Get screen position
        const pos = this.persp.getLaneX(note.lane, depth);
        
        // Skip if scale too small
        if (pos.scale < 0.02) return;
        
        const ctx = this.ctx;
        
        // Save context
        ctx.save();
        
        // Render based on note type
        switch (note.type) {
            case 'tap':
                this.renderTapNote(ctx, pos, note, depth);
                break;
            case 'hold':
                this.renderHoldNote(ctx, pos, note, depth, currentTime);
                break;
            case 'flick':
                this.renderFlickNote(ctx, pos, note, depth);
                break;
        }
        
        ctx.restore();
    }
    
    renderTapNote(ctx, pos, note, depth) {
        const baseSize = 35;
        const size = baseSize * pos.scale * 18;
        
        // Note color
        const color = CONFIG.NOTE_COLORS.TAP;
        
        // Glow effect
        ctx.shadowColor = color;
        ctx.shadowBlur = 25 * pos.scale * 12;
        
        // Draw tap note (circular with ring)
        // Outer glow ring
        ctx.strokeStyle = color;
        ctx.lineWidth = 3 * pos.scale;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
        ctx.stroke();
        
        // Inner filled circle
        ctx.fillStyle = color + '60'; // Semi-transparent
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, size * 0.85, 0, Math.PI * 2);
        ctx.fill();
        
        // Center bright spot
        const gradient = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, size * 0.5);
        gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
        gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, size * 0.5, 0, Math.PI * 2);
        ctx.fill();
    }
    
    renderHoldNote(ctx, pos, note, depth, currentTime) {
        const baseSize = 35;
        const size = baseSize * pos.scale * 18;
        
        // Calculate end position
        const endDepth = depth + note.holdDuration * 600;
        const endPos = this.persp.getLaneX(note.lane, endDepth);
        
        const color = CONFIG.NOTE_COLORS.HOLD;
        
        // Draw trail from end to head
        ctx.shadowColor = color;
        ctx.shadowBlur = 20 * pos.scale * 10;
        
        // Trail gradient
        const trailGradient = ctx.createLinearGradient(0, pos.y, 0, endPos.y);
        trailGradient.addColorStop(0, color);
        trailGradient.addColorStop(1, color + '20');
        
        ctx.fillStyle = trailGradient;
        ctx.beginPath();
        
        const trailWidthNear = size * 0.8;
        const trailWidthFar = 12 * endPos.scale;
        
        ctx.moveTo(pos.x - trailWidthNear / 2, pos.y);
        ctx.lineTo(endPos.x - trailWidthFar / 2, endPos.y);
        ctx.lineTo(endPos.x + trailWidthFar / 2, endPos.y);
        ctx.lineTo(pos.x + trailWidthNear / 2, pos.y);
        ctx.closePath();
        ctx.fill();
        
        // Head circle
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, size * 0.7, 0, Math.PI * 2);
        ctx.fill();
        
        // Head highlight
        const headGradient = ctx.createRadialGradient(
            pos.x - size * 0.2, pos.y - size * 0.2, 0,
            pos.x, pos.y, size * 0.7
        );
        headGradient.addColorStop(0, 'rgba(255, 255, 255, 0.6)');
        headGradient.addColorStop(1, 'transparent');
        ctx.fillStyle = headGradient;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, size * 0.7, 0, Math.PI * 2);
        ctx.fill();
    }
    
    renderFlickNote(ctx, pos, note, depth) {
        const baseSize = 35;
        const size = baseSize * pos.scale * 18;
        
        const color = note.flickDirection > 0 ? CONFIG.NOTE_COLORS.FLICK_R : CONFIG.NOTE_COLORS.FLICK_L;
        
        // Glow
        ctx.shadowColor = color;
        ctx.shadowBlur = 30 * pos.scale * 12;
        
        // Draw arrow shape
        ctx.fillStyle = color;
        ctx.beginPath();
        
        const arrowSize = size * 1.3;
        
        if (note.flickDirection > 0) {
            // Right arrow
            ctx.moveTo(pos.x - arrowSize * 0.3, pos.y - arrowSize);
            ctx.lineTo(pos.x + arrowSize * 0.8, pos.y);
            ctx.lineTo(pos.x - arrowSize * 0.3, pos.y + arrowSize);
            ctx.lineTo(pos.x - arrowSize * 0.5, pos.y);
        } else {
            // Left arrow
            ctx.moveTo(pos.x + arrowSize * 0.3, pos.y - arrowSize);
            ctx.lineTo(pos.x - arrowSize * 0.8, pos.y);
            ctx.lineTo(pos.x + arrowSize * 0.3, pos.y + arrowSize);
            ctx.lineTo(pos.x + arrowSize * 0.5, pos.y);
        }
        
        ctx.closePath();
        ctx.fill();
        
        // Arrow glow center
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, size * 0.25, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ============================================================================
// TRACK RENDERER
// ============================================================================
class TrackRenderer {
    constructor(ctx, perspective) {
        this.ctx = ctx;
        this.persp = perspective;
    }
    
    render() {
        const ctx = this.ctx;
        const p = this.persp;
        
        // Clear
        ctx.fillStyle = '#020208';
        ctx.fillRect(0, 0, p.width, p.height);
        
        // Draw track floor
        this.drawFloor(ctx, p);
        
        // Draw perspective grid
        this.drawGrid(ctx, p);
        
        // Draw lane dividers
        this.drawLaneDividers(ctx, p);
        
        // Draw track edges
        this.drawEdges(ctx, p);
        
        // Draw horizon glow
        this.drawHorizonGlow(ctx, p);
    }
    
    drawFloor(ctx, p) {
        const gradient = ctx.createLinearGradient(0, p.horizonY, 0, p.receptorY);
        gradient.addColorStop(0, 'rgba(0, 100, 150, 0.02)');
        gradient.addColorStop(0.3, 'rgba(0, 150, 200, 0.04)');
        gradient.addColorStop(0.6, 'rgba(0, 180, 220, 0.06)');
        gradient.addColorStop(1, 'rgba(0, 200, 240, 0.1)');
        
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.moveTo(p.centerX - p.trackWidthFar / 2, p.horizonY);
        ctx.lineTo(p.centerX + p.trackWidthFar / 2, p.horizonY);
        ctx.lineTo(p.centerX + p.trackWidthNear / 2, p.receptorY);
        ctx.lineTo(p.centerX - p.trackWidthNear / 2, p.receptorY);
        ctx.closePath();
        ctx.fill();
    }
    
    drawGrid(ctx, p) {
        // Horizontal lines (depth markers)
        ctx.strokeStyle = 'rgba(0, 200, 240, 0.06)';
        ctx.lineWidth = 1;
        
        const lineCount = 20;
        for (let i = 1; i < lineCount; i++) {
            const t = i / lineCount;
            const y = p.horizonY + (p.receptorY - p.horizonY) * t;
            const width = p.trackWidthFar + (p.trackWidthNear - p.trackWidthFar) * t;
            
            ctx.beginPath();
            ctx.moveTo(p.centerX - width / 2, y);
            ctx.lineTo(p.centerX + width / 2, y);
            ctx.stroke();
        }
    }
    
    drawLaneDividers(ctx, p) {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
        ctx.lineWidth = 1;
        
        for (let i = 1; i < 4; i++) {
            const ratio = i / 4;
            const nearX = p.centerX + (ratio - 0.5) * p.trackWidthNear * 2;
            const farX = p.centerX + (ratio - 0.5) * p.trackWidthFar * 2;
            
            ctx.beginPath();
            ctx.moveTo(farX, p.horizonY);
            ctx.lineTo(nearX, p.receptorY);
            ctx.stroke();
        }
    }
    
    drawEdges(ctx, p) {
        // Left edge
        ctx.strokeStyle = CONFIG.COLORS.CYAN;
        ctx.lineWidth = 2;
        ctx.shadowColor = CONFIG.COLORS.CYAN;
        ctx.shadowBlur = 15;
        
        ctx.beginPath();
        ctx.moveTo(p.centerX - p.trackWidthFar / 2, p.horizonY);
        ctx.lineTo(p.centerX - p.trackWidthNear / 2, p.receptorY);
        ctx.stroke();
        
        // Right edge
        ctx.beginPath();
        ctx.moveTo(p.centerX + p.trackWidthFar / 2, p.horizonY);
        ctx.lineTo(p.centerX + p.trackWidthNear / 2, p.receptorY);
        ctx.stroke();
        
        ctx.shadowBlur = 0;
    }
    
    drawHorizonGlow(ctx, p) {
        // Horizon glow
        const glowGradient = ctx.createRadialGradient(
            p.centerX, p.horizonY, 0,
            p.centerX, p.horizonY, 400
        );
        glowGradient.addColorStop(0, 'rgba(0, 200, 240, 0.3)');
        glowGradient.addColorStop(0.5, 'rgba(0, 150, 200, 0.1)');
        glowGradient.addColorStop(1, 'transparent');
        
        ctx.fillStyle = glowGradient;
        ctx.fillRect(0, 0, p.width, p.horizonY + 100);
        
        // Bright center line at horizon
        ctx.strokeStyle = 'rgba(0, 240, 255, 0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(p.centerX - p.trackWidthFar / 2, p.horizonY);
        ctx.lineTo(p.centerX + p.trackWidthFar / 2, p.horizonY);
        ctx.stroke();
    }
    
    drawReceptors(pressedLanes) {
        const ctx = this.ctx;
        const positions = this.persp.getReceptors();
        
        for (let i = 0; i < 4; i++) {
            const pos = positions[i];
            const isPressed = pressedLanes[i];
            
            ctx.save();
            
            if (isPressed) {
                ctx.shadowColor = CONFIG.COLORS.CYAN;
                ctx.shadowBlur = 40;
                ctx.strokeStyle = CONFIG.COLORS.WHITE;
                ctx.fillStyle = 'rgba(0, 240, 255, 0.4)';
            } else {
                ctx.shadowColor = CONFIG.COLORS.CYAN;
                ctx.shadowBlur = 20;
                ctx.strokeStyle = 'rgba(0, 240, 255, 0.6)';
                ctx.fillStyle = 'rgba(0, 240, 255, 0.08)';
            }
            
            ctx.lineWidth = 3;
            
            // Draw receptor circle
            const radius = 28;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // Inner ring
            ctx.strokeStyle = isPressed ? 'rgba(255, 255, 255, 0.5)' : 'rgba(0, 240, 255, 0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, radius * 0.6, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.restore();
        }
    }
}

// ============================================================================
// GAME STATE MANAGER
// ============================================================================
class GameState {
    constructor() {
        this.currentScreen = 'title';
        this.song = null;
        this.difficulty = 'normal';
        this.isPaused = false;
        this.isPlaying = false;
    }
    
    showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(screen => {
            screen.classList.remove('active');
        });
        document.getElementById(screenId).classList.add('active');
        this.currentScreen = screenId.replace('Screen', '');
    }
    
    showPauseMenu(show) {
        const menu = document.getElementById('pauseMenu');
        if (show) {
            menu.classList.add('show');
        } else {
            menu.classList.remove('show');
        }
        this.isPaused = show;
    }
}

// ============================================================================
// MAIN GAME CLASS
// ============================================================================
class Game {
    constructor() {
        // Core systems
        this.perspective = new PerspectiveEngine();
        this.particles = new ParticleSystem();
        this.audio = new AudioEngine();
        this.state = new GameState();
        this.noteRenderer = new NoteRenderer(this.perspective.ctx, this.perspective);
        this.trackRenderer = new TrackRenderer(this.perspective.ctx, this.perspective);
        
        // Game state
        this.chart = [];
        this.notes = [];
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.life = 100;
        this.perfect = 0;
        this.great = 0;
        this.good = 0;
        this.miss = 0;
        
        // Timing
        this.gameStartTime = 0;
        this.currentTime = 0;
        
        // Input
        this.pressedLanes = [false, false, false, false];
        this.keys = {};
        
        // Demo songs
        this.demoSongs = [
            { name: 'Neon Dreams', artist: 'Synthwave', difficulty: 7 },
            { name: 'Digital Pulse', artist: 'Cyber Beat', difficulty: 9 },
            { name: 'Stellar Wind', artist: 'Cosmic DJ', difficulty: 11 },
            { name: 'Arcade Hero', artist: 'Retro Wave', difficulty: 5 }
        ];
        
        // Initialize
        this.init();
    }
    
    init() {
        this.bindEvents();
        this.populateSongList();
        this.gameLoop();
    }
    
    bindEvents() {
        // Title screen
        document.getElementById('btnUpload').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            if (e.target.files.length > 0) {
                this.state.song = {
                    name: e.target.files[0].name.replace(/\.[^/.]+$/, ''),
                    artist: 'Unknown Artist',
                    file: e.target.files[0],
                    difficulty: 7
                };
                this.state.showScreen('difficulty');
                document.getElementById('selectedSongTitle').textContent = this.state.song.name;
            }
        });
        
        document.getElementById('btnDemo').addEventListener('click', () => {
            this.state.song = this.demoSongs[0];
            this.state.showScreen('difficulty');
            document.getElementById('selectedSongTitle').textContent = this.state.song.name;
        });
        
        // Difficulty selection
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                this.state.difficulty = btn.dataset.diff;
                this.startAnalysis();
            });
        });
        
        // Navigation
        document.getElementById('btnBackToTitle').addEventListener('click', () => {
            this.state.showScreen('title');
        });
        
        document.getElementById('btnBackToSongs').addEventListener('click', () => {
            this.state.showScreen('songSelect');
        });
        
        // Pause menu
        document.getElementById('btnResume').addEventListener('click', () => {
            this.resumeGame();
        });
        
        document.getElementById('btnRestart').addEventListener('click', () => {
            this.state.showPauseMenu(false);
            this.startGame();
        });
        
        document.getElementById('btnQuit').addEventListener('click', () => {
            this.state.showPauseMenu(false);
            this.stopGame();
            this.state.showScreen('title');
        });
        
        // Results
        document.getElementById('btnPlayAgain').addEventListener('click', () => {
            this.state.showScreen('difficulty');
        });
        
        document.getElementById('btnResultsBack').addEventListener('click', () => {
            this.state.showScreen('title');
        });
        
        // Keyboard input
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            // Prevent default for game keys
            if (['d', 'f', 'j', 'k', 'escape', ' '].includes(key)) {
                e.preventDefault();
            }
            
            // Pause with Escape or Space
            if (key === 'escape' || key === ' ') {
                if (this.state.isPlaying && !this.state.isPaused) {
                    this.pauseGame();
                } else if (this.state.isPaused) {
                    this.resumeGame();
                }
                return;
            }
            
            // Game keys
            if (this.state.isPlaying && !this.state.isPaused && !this.keys[key]) {
                this.keys[key] = true;
                this.handleKeyDown(key);
            }
        });
        
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            this.keys[key] = false;
            
            if (this.state.isPlaying) {
                this.handleKeyUp(key);
            }
        });
        
        // Touch input
        document.querySelectorAll('.touch-btn').forEach((btn, index) => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                btn.classList.add('active');
                if (this.state.isPlaying && !this.state.isPaused) {
                    this.hitLane(index);
                }
            });
            
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                btn.classList.remove('active');
            });
            
            btn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                if (this.state.isPlaying && !this.state.isPaused) {
                    this.hitLane(index);
                }
            });
        });
    }
    
    populateSongList() {
        const songList = document.getElementById('songList');
        songList.innerHTML = '';
        
        // Add demo songs
        this.demoSongs.forEach((song, index) => {
            const item = document.createElement('div');
            item.className = 'song-item';
            item.innerHTML = `
                <div class="song-info">
                    <div class="song-title">${song.name}</div>
                    <div class="song-artist">${song.artist}</div>
                </div>
                <div class="song-difficulty">
                    <div class="diff-value ${this.getDiffClass(song.difficulty)}">${song.difficulty}</div>
                    <div class="diff-label">LEVEL</div>
                </div>
            `;
            
            item.addEventListener('click', () => {
                this.state.song = song;
                this.state.showScreen('difficulty');
                document.getElementById('selectedSongTitle').textContent = song.name;
            });
            
            songList.appendChild(item);
        });
    }
    
    getDiffClass(difficulty) {
        if (difficulty <= 3) return 'easy';
        if (difficulty <= 6) return 'normal';
        if (difficulty <= 9) return 'hard';
        return 'extreme';
    }
    
    handleKeyDown(key) {
        const keyMap = { 'd': 0, 'f': 1, 'j': 2, 'k': 3 };
        if (keyMap.hasOwnProperty(key) !== undefined) {
            const lane = keyMap[key];
            this.pressedLanes[lane] = true;
            this.hitLane(lane);
        }
    }
    
    handleKeyUp(key) {
        const keyMap = { 'd': 0, 'f': 1, 'j': 2, 'k': 3 };
        if (keyMap.hasOwnProperty(key) !== undefined) {
            const lane = keyMap[key];
            this.pressedLanes[lane] = false;
        }
    }
    
    async startAnalysis() {
        this.state.showScreen('loading');
        
        try {
            // Initialize audio
            await this.audio.init();
            
            // Load audio file
            if (this.state.song.file) {
                document.getElementById('loadingStatus').textContent = 'Loading audio...';
                await this.audio.loadAudio(this.state.song.file);
            } else {
                // Create dummy audio for demo
                this.audio.duration = 120;
                this.audio.bpm = 128;
                this.audio.beats = [];
            }
            
            // Analyze
            await this.audio.analyze((progress, status) => {
                document.getElementById('loadingBar').style.width = `${progress}%`;
                document.getElementById('loadingStatus').textContent = status;
            });
            
            // Show BPM
            document.getElementById('detectedBpm').textContent = this.audio.bpm;
            
            // Generate chart
            if (this.state.song.file) {
                const generator = new ChartGenerator(this.audio, this.state.difficulty);
                this.chart = generator.generate();
            } else {
                // Generate demo chart
                this.chart = this.generateDemoChart();
            }
            
            // Wait and start
            await this.sleep(1000);
            this.startGame();
            
        } catch (error) {
            console.error('Analysis error:', error);
            alert('Error analyzing audio: ' + error.message);
            this.state.showScreen('difficulty');
        }
    }
    
    generateDemoChart() {
        const notes = [];
        const bpm = this.audio.bpm || 128;
        const beatInterval = 60 / bpm;
        const duration = 120;
        
        const settings = CONFIG.DIFFICULTY[this.state.difficulty];
        const lastTime = [-999, -999, -999, -999];
        
        for (let time = beatInterval; time < duration; time += beatInterval) {
            if (Math.random() > settings.density) continue;
            
            const availableLanes = [];
            for (let lane = 0; lane < 4; lane++) {
                if (time - lastTime[lane] >= settings.minGap) {
                    availableLanes.push(lane);
                }
            }
            
            if (availableLanes.length === 0) continue;
            
            const lane = availableLanes[Math.floor(Math.random() * availableLanes.length)];
            
            let type = 'tap';
            const rand = Math.random();
            
            if (rand < settings.holdChance) type = 'hold';
            else if (rand < settings.holdChance + settings.flickChance) type = 'flick';
            
            const note = {
                time,
                lane,
                type,
                hit: false,
                missed: false,
                holdDuration: type === 'hold' ? 0.3 + Math.random() * 0.5 : 0,
                flickDirection: type === 'flick' ? (Math.random() > 0.5 ? 1 : -1) : 0
            };
            
            notes.push(note);
            lastTime[lane] = time;
        }
        
        return notes.sort((a, b) => a.time - b.time);
    }
    
    startGame() {
        // Reset state
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.life = 100;
        this.perfect = this.great = this.good = this.miss = 0;
        
        // Copy chart
        this.notes = this.chart.map(n => ({ ...n, hit: false, missed: false }));
        
        // Update UI
        this.updateHUD();
        
        // Show game screen
        this.state.showScreen('game');
        
        // Start timing
        this.gameStartTime = performance.now();
        this.state.isPlaying = true;
        this.state.isPaused = false;
        
        // Play audio
        if (this.state.song.file) {
            this.audio.play();
        }
    }
    
    pauseGame() {
        this.state.isPaused = true;
        this.audio.pause();
        this.state.showPauseMenu(true);
    }
    
    resumeGame() {
        this.state.showPauseMenu(false);
        this.state.isPaused = false;
        this.audio.resume();
        this.gameStartTime = performance.now() - this.audio.pauseTime * 1000;
    }
    
    stopGame() {
        this.state.isPlaying = false;
        this.audio.stop();
    }
    
    hitLane(lane) {
        const now = this.getCurrentTime();
        
        // Find closest note in lane
        let closestNote = null;
        let closestDiff = Infinity;
        
        for (const note of this.notes) {
            if (note.lane === lane && !note.hit && !note.missed) {
                const diff = Math.abs(note.time - now);
                if (diff < closestDiff && diff <= CONFIG.TIMING.MISS / 1000) {
                    closestDiff = diff;
                    closestNote = note;
                }
            }
        }
        
        if (closestNote) {
            this.processHit(closestNote, closestDiff);
        }
    }
    
    processHit(note, timeDiff) {
        note.hit = true;
        
        const ms = timeDiff * 1000;
        let judgment = 'miss';
        let points = 0;
        
        if (ms <= CONFIG.TIMING.PERFECT) {
            judgment = 'perfect';
            points = CONFIG.SCORE.PERFECT;
            this.perfect++;
            this.triggerScreenShake();
            this.showHitFlash();
        } else if (ms <= CONFIG.TIMING.GREAT) {
            judgment = 'great';
            points = CONFIG.SCORE.GREAT;
            this.great++;
        } else if (ms <= CONFIG.TIMING.GOOD) {
            judgment = 'good';
            points = CONFIG.SCORE.GOOD;
            this.good++;
        } else {
            judgment = 'miss';
            points = CONFIG.SCORE.MISS;
            this.miss++;
        }
        
        // Update combo
        if (judgment !== 'miss') {
            this.combo++;
            this.maxCombo = Math.max(this.maxCombo, this.combo);
            this.life = Math.min(100, this.life + 2);
        } else {
            this.combo = 0;
            this.life = Math.max(0, this.life - 10);
        }
        
        // Calculate score with combo multiplier
        const comboMultiplier = 1 + Math.floor(this.combo / CONFIG.COMBO_THRESHOLD) * CONFIG.COMBO_BONUS;
        this.score += Math.round(points * comboMultiplier);
        
        // Show effects
        this.showJudgment(judgment);
        this.spawnHitParticles(note.lane, judgment);
        
        // Update HUD
        this.updateHUD();
        
        // Check for game over
        if (this.life <= 0) {
            this.gameOver();
        }
    }
    
    missNote(note) {
        if (note.missed || note.hit) return;
        
        note.missed = true;
        this.combo = 0;
        this.miss++;
        this.life = Math.max(0, this.life - 10);
        
        this.showJudgment('miss');
        this.updateHUD();
        
        if (this.life <= 0) {
            this.gameOver();
        }
    }
    
    showJudgment(judgment) {
        const display = document.getElementById('judgmentDisplay');
        display.textContent = judgment.toUpperCase();
        display.className = 'judgment-display ' + judgment;
        display.classList.add('show');
        
        setTimeout(() => {
            display.classList.remove('show');
        }, 200);
    }
    
    triggerScreenShake() {
        document.getElementById('gameScreen').classList.add('shake');
        setTimeout(() => {
            document.getElementById('gameScreen').classList.remove('shake');
        }, 150);
    }
    
    showHitFlash() {
        const flash = document.getElementById('hitFlash');
        flash.classList.add('show');
        setTimeout(() => flash.classList.remove('show'), 100);
    }
    
    spawnHitParticles(lane, judgment) {
        const receptor = this.perspective.getReceptors()[lane];
        
        const colors = {
            perfect: CONFIG.COLORS.CYAN,
            great: CONFIG.COLORS.GREEN,
            good: CONFIG.COLORS.YELLOW,
            miss: CONFIG.COLORS.PINK
        };
        
        this.particles.emit(receptor.x, receptor.y, colors[judgment], 15, 8);
    }
    
    updateHUD() {
        document.getElementById('scoreDisplay').textContent = Utils.formatScore(this.score);
        
        const comboDisplay = document.getElementById('comboDisplay');
        comboDisplay.textContent = this.combo.toString();
        comboDisplay.classList.add('pulse');
        setTimeout(() => comboDisplay.classList.remove('pulse'), 150);
        
        // Progress bar
        const progress = (this.currentTime / this.audio.duration) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('progressTime').textContent = 
            `${Utils.formatTime(this.currentTime)} / ${Utils.formatTime(this.audio.duration)}`;
    }
    
    gameOver() {
        this.state.isPlaying = false;
        this.audio.stop();
        
        // Calculate results
        const totalNotes = this.perfect + this.great + this.good + this.miss;
        const accuracy = totalNotes > 0 
            ? ((this.perfect + this.great * 0.8 + this.good * 0.5) / totalNotes * 100).toFixed(2)
            : 0;
        
        // Determine rank
        let rank = 'D';
        if (accuracy >= 97) rank = 'S';
        else if (accuracy >= 93) rank = 'A';
        else if (accuracy >= 85) rank = 'B';
        else if (accuracy >= 75) rank = 'C';
        
        // Update results screen
        document.getElementById('resultsSong').textContent = this.state.song.name;
        document.getElementById('rankDisplay').textContent = rank;
        document.getElementById('rankDisplay').className = 'rank-display ' + rank;
        document.getElementById('finalScore').textContent = Utils.formatScore(this.score);
        document.getElementById('statPerfect').textContent = this.perfect;
        document.getElementById('statGreat').textContent = this.great;
        document.getElementById('statGood').textContent = this.good;
        document.getElementById('statMiss').textContent = this.miss;
        document.getElementById('statCombo').textContent = this.maxCombo;
        document.getElementById('statAcc').textContent = accuracy + '%';
        
        // Show results
        this.state.showScreen('results');
    }
    
    getCurrentTime() {
        if (!this.state.isPlaying) return 0;
        return (performance.now() - this.gameStartTime) / 1000;
    }
    
    sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
    
    gameLoop() {
        if (this.state.isPlaying && !this.state.isPaused) {
            this.currentTime = this.getCurrentTime();
            
            // Check for missed notes
            for (const note of this.notes) {
                if (!note.hit && !note.missed && this.currentTime - note.time > CONFIG.TIMING.MISS / 1000) {
                    this.missNote(note);
                }
            }
            
            // Check for song end
            if (this.currentTime > this.audio.duration + 1) {
                this.gameOver();
            }
            
            // Update HUD time
            const progress = (this.currentTime / this.audio.duration) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('progressTime').textContent = 
                `${Utils.formatTime(this.currentTime)} / ${Utils.formatTime(this.audio.duration)}`;
        }
        
        // Render game if playing
        if (this.state.isPlaying) {
            this.render();
        }
        
        // Update particles
        this.particles.update();
        
        // Continue loop
        requestAnimationFrame(() => this.gameLoop());
    }
    
    render() {
        const ctx = this.perspective.ctx;
        
        // Render track
        this.trackRenderer.render();
        
        // Render notes
        for (const note of this.notes) {
            if (!note.hit && !note.missed) {
                this.noteRenderer.render(note, this.currentTime);
            }
        }
        
        // Render receptors
        this.trackRenderer.drawReceptors(this.pressedLanes);
    }
}
