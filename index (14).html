<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCADE — Rhythm of Light</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        :root {
            --cyan: #00f4ff;
            --cyan-glow: rgba(0, 244, 255, 0.6);
            --pink: #ff00aa;
            --pink-glow: rgba(255, 0, 170, 0.6);
            --purple: #aa00ff;
            --white: #ffffff;
            --black: #000000;
            --bg-dark: #020208;
            --bg-panel: rgba(10, 10, 20, 0.95);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Exo 2', sans-serif;
            background: var(--black);
            color: var(--white);
        }

        /* ========== CANVAS ========== */
        #gameCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* ========== SCREENS ========== */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        /* ========== TITLE SCREEN ========== */
        #titleScreen {
            background: radial-gradient(ellipse at 50% 30%, rgba(0, 100, 150, 0.3) 0%, transparent 50%),
                        linear-gradient(180deg, #0a0a15 0%, #020208 100%);
        }

        .title-logo {
            font-family: 'Russo One', sans-serif;
            font-size: clamp(4rem, 12vw, 8rem);
            letter-spacing: 0.15em;
            background: linear-gradient(180deg, #ffffff 0%, #00f4ff 50%, #ff00aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(0, 244, 255, 0.8)) drop-shadow(0 0 80px rgba(255, 0, 170, 0.5));
            animation: titlePulse 2s ease-in-out infinite;
            margin-bottom: 0.5rem;
        }

        @keyframes titlePulse {
            0%, 100% { filter: drop-shadow(0 0 40px rgba(0, 244, 255, 0.8)) drop-shadow(0 0 80px rgba(255, 0, 170, 0.5)); }
            50% { filter: drop-shadow(0 0 60px rgba(0, 244, 255, 1)) drop-shadow(0 0 120px rgba(255, 0, 170, 0.8)); }
        }

        .title-subtitle {
            font-size: 1.2rem;
            letter-spacing: 0.8em;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 4rem;
            text-transform: uppercase;
        }

        .title-btn {
            font-family: 'Russo One', sans-serif;
            font-size: 1.4rem;
            padding: 1.2rem 4rem;
            margin: 0.5rem;
            border: 2px solid var(--cyan);
            background: transparent;
            color: var(--cyan);
            cursor: pointer;
            letter-spacing: 0.3em;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .title-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 244, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .title-btn:hover::before {
            left: 100%;
        }

        .title-btn:hover {
            background: rgba(0, 244, 255, 0.15);
            box-shadow: 0 0 50px rgba(0, 244, 255, 0.5), inset 0 0 30px rgba(0, 244, 255, 0.2);
            transform: scale(1.05);
        }

        .title-btn.pink {
            border-color: var(--pink);
            color: var(--pink);
        }

        .title-btn.pink:hover {
            background: rgba(255, 0, 170, 0.15);
            box-shadow: 0 0 50px rgba(255, 0, 170, 0.5), inset 0 0 30px rgba(255, 0, 170, 0.2);
        }

        /* ========== SONG SELECT ========== */
        #songSelectScreen {
            background: linear-gradient(180deg, #0a0a15 0%, #020208 100%);
        }

        .song-select-header {
            font-family: 'Russo One', sans-serif;
            font-size: 2rem;
            letter-spacing: 0.2em;
            color: var(--cyan);
            margin-bottom: 2rem;
            text-shadow: 0 0 20px var(--cyan-glow);
        }

        .song-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 600px;
            width: 90%;
            max-height: 60vh;
            overflow-y: auto;
            padding: 1rem;
        }

        .song-item {
            background: var(--bg-panel);
            border: 1px solid rgba(0, 244, 255, 0.3);
            border-radius: 8px;
            padding: 1.2rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .song-item:hover {
            background: rgba(0, 244, 255, 0.1);
            border-color: var(--cyan);
            box-shadow: 0 0 30px rgba(0, 244, 255, 0.3);
            transform: translateX(10px);
        }

        .song-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .song-title {
            font-family: 'Russo One', sans-serif;
            font-size: 1.2rem;
            color: var(--white);
        }

        .song-artist {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .song-difficulty {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.3rem;
        }

        .diff-value {
            font-family: 'Russo One', sans-serif;
            font-size: 1.5rem;
        }

        .diff-value.easy { color: #00ff88; }
        .diff-value.normal { color: var(--cyan); }
        .diff-value.hard { color: #ff8800; }
        .diff-value.extreme { color: var(--pink); }

        .diff-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.4);
        }

        .back-btn {
            margin-top: 2rem;
            padding: 0.8rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Exo 2', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            border-color: var(--white);
            color: var(--white);
        }

        /* ========== DIFFICULTY SELECT ========== */
        #difficultyScreen {
            background: linear-gradient(180deg, #0a0a15 0%, #020208 100%);
        }

        .diff-select-header {
            font-family: 'Russo One', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.15em;
            color: var(--white);
            margin-bottom: 0.5rem;
        }

        .song-title-display {
            font-family: 'Russo One', sans-serif;
            font-size: 2.5rem;
            background: linear-gradient(90deg, var(--cyan), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
        }

        .diff-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            max-width: 500px;
            width: 90%;
        }

        .diff-btn {
            font-family: 'Russo One', sans-serif;
            padding: 1.5rem 2rem;
            border: 2px solid;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .diff-btn.easy { border-color: #00ff88; color: #00ff88; }
        .diff-btn.normal { border-color: var(--cyan); color: var(--cyan); }
        .diff-btn.hard { border-color: #ff8800; color: #ff8800; }
        .diff-btn.extreme { border-color: var(--pink); color: var(--pink); }

        .diff-btn:hover {
            transform: scale(1.05);
        }

        .diff-btn.easy:hover { background: rgba(0, 255, 136, 0.15); box-shadow: 0 0 40px rgba(0, 255, 136, 0.5); }
        .diff-btn.normal:hover { background: rgba(0, 244, 255, 0.15); box-shadow: 0 0 40px rgba(0, 244, 255, 0.5); }
        .diff-btn.hard:hover { background: rgba(255, 136, 0, 0.15); box-shadow: 0 0 40px rgba(255, 136, 0, 0.5); }
        .diff-btn.extreme:hover { background: rgba(255, 0, 170, 0.15); box-shadow: 0 0 40px rgba(255, 0, 170, 0.5); }

        .diff-btn .rating {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .diff-btn .name {
            font-size: 1rem;
            letter-spacing: 0.3em;
            opacity: 0.8;
        }

        /* ========== LOADING ========== */
        #loadingScreen {
            background: radial-gradient(ellipse at center, rgba(0, 50, 80, 0.4) 0%, transparent 60%);
        }

        .loading-container {
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .loading-title {
            font-family: 'Russo One', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.2em;
            color: var(--cyan);
            margin-bottom: 2rem;
        }

        .loading-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--cyan), var(--pink));
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .loading-status {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .bpm-display {
            margin-top: 2rem;
            font-family: 'Russo One', sans-serif;
            font-size: 3rem;
            color: var(--cyan);
            text-shadow: 0 0 30px var(--cyan-glow);
        }

        .bpm-label {
            font-size: 0.8rem;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.4);
        }

        /* ========== GAME SCREEN ========== */
        #gameScreen {
            z-index: 200;
        }

        .game-hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 300;
            pointer-events: none;
        }

        .hud-left, .hud-right {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .hud-right {
            align-items: flex-end;
        }

        .score-display {
            font-family: 'Russo One', sans-serif;
            font-size: 2.5rem;
            color: var(--white);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .combo-display {
            font-family: 'Russo One', sans-serif;
            font-size: 2rem;
            color: var(--pink);
            text-shadow: 0 0 20px var(--pink-glow);
            transition: transform 0.1s ease;
        }

        .combo-display.pulse {
            transform: scale(1.3);
        }

        .combo-label {
            font-size: 0.8rem;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.5);
        }

        .progress-container {
            width: 200px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--cyan), var(--pink));
            transition: width 0.1s linear;
        }

        .progress-time {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 0.3rem;
            text-align: right;
        }

        /* Judgment Display */
        .judgment-display {
            position: fixed;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Russo One', sans-serif;
            font-size: 4rem;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            z-index: 400;
            text-shadow: 0 0 40px currentColor;
            transition: opacity 0.1s ease, transform 0.1s ease;
        }

        .judgment-display.show {
            opacity: 1;
            transform: translateX(-50%) scale(1.1);
        }

        .judgment-display.perfect { color: var(--cyan); }
        .judgment-display.great { color: #00ff88; }
        .judgment-display.good { color: #ffff00; }
        .judgment-display.miss { color: var(--pink); }

        /* Hit Effects */
        .hit-flash {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: radial-gradient(ellipse at 50% 100%, rgba(0, 244, 255, 0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: 250;
            opacity: 0;
            transition: opacity 0.1s ease;
        }

        .hit-flash.show {
            opacity: 1;
        }

        /* Lane Covers */
        .lane-flash {
            position: fixed;
            bottom: 100px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 244, 255, 0.8) 0%, transparent 70%);
            pointer-events: none;
            z-index: 280;
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.05s ease, transform 0.05s ease;
        }

        .lane-flash.show {
            opacity: 1;
            transform: scale(1);
        }

        /* Touch Receptors */
        .touch-areas {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 350;
            pointer-events: none;
        }

        .touch-btn {
            width: 70px;
            height: 70px;
            border: 3px solid rgba(0, 244, 255, 0.5);
            border-radius: 50%;
            background: rgba(0, 244, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Russo One', sans-serif;
            font-size: 1.3rem;
            color: rgba(0, 244, 255, 0.7);
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.05s ease;
        }

        .touch-btn:active, .touch-btn.active {
            background: rgba(0, 244, 255, 0.3);
            border-color: var(--cyan);
            box-shadow: 0 0 40px var(--cyan-glow), inset 0 0 20px rgba(0, 244, 255, 0.3);
            transform: scale(0.9);
            color: var(--white);
        }

        /* Pause Menu */
        .pause-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 500;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .pause-menu.show {
            opacity: 1;
            visibility: visible;
        }

        .pause-title {
            font-family: 'Russo One', sans-serif;
            font-size: 3rem;
            color: var(--cyan);
            margin-bottom: 3rem;
            text-shadow: 0 0 30px var(--cyan-glow);
        }

        .pause-btn {
            font-family: 'Russo One', sans-serif;
            font-size: 1.2rem;
            padding: 1rem 3rem;
            margin: 0.5rem;
            border: 2px solid var(--white);
            background: transparent;
            color: var(--white);
            cursor: pointer;
            letter-spacing: 0.2em;
            transition: all 0.3s ease;
        }

        .pause-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .pause-btn.resume {
            border-color: var(--cyan);
            color: var(--cyan);
        }

        .pause-btn.resume:hover {
            background: rgba(0, 244, 255, 0.1);
            box-shadow: 0 0 30px var(--cyan-glow);
        }

        /* ========== RESULTS SCREEN ========== */
        #resultsScreen {
            background: radial-gradient(ellipse at center, rgba(50, 0, 80, 0.4) 0%, transparent 60%);
        }

        .results-container {
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        .results-title {
            font-family: 'Russo One', sans-serif;
            font-size: 2rem;
            letter-spacing: 0.2em;
            color: var(--pink);
            margin-bottom: 1rem;
        }

        .results-song {
            font-family: 'Russo One', sans-serif;
            font-size: 1.5rem;
            color: var(--white);
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .rank-display {
            font-family: 'Russo One', sans-serif;
            font-size: 12rem;
            line-height: 1;
            margin-bottom: 1rem;
        }

        .rank-display.S { color: var(--cyan); text-shadow: 0 0 80px var(--cyan-glow); }
        .rank-display.A { color: #00ff88; text-shadow: 0 0 80px rgba(0, 255, 136, 0.6); }
        .rank-display.B { color: #ffff00; text-shadow: 0 0 80px rgba(255, 255, 0, 0.6); }
        .rank-display.C { color: #ff8800; text-shadow: 0 0 80px rgba(255, 136, 0, 0.6); }
        .rank-display.D { color: var(--pink); text-shadow: 0 0 80px var(--pink-glow); }

        .final-score {
            font-family: 'Russo One', sans-serif;
            font-size: 4rem;
            color: var(--white);
            margin-bottom: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            background: var(--bg-panel);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-family: 'Russo One', sans-serif;
            font-size: 2rem;
            color: var(--cyan);
        }

        .stat-label {
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 0.3rem;
        }

        .stat-box.perfect .stat-value { color: var(--cyan); }
        .stat-box.great .stat-value { color: #00ff88; }
        .stat-box.good .stat-value { color: #ffff00; }
        .stat-box.miss .stat-value { color: var(--pink); }
        .stat-box.combo .stat-value { color: var(--pink); }
        .stat-box.acc .stat-value { color: var(--purple); }

        .results-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ========== EFFECTS ========== */
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-5px, -3px) rotate(-0.5deg); }
            40% { transform: translate(5px, 3px) rotate(0.5deg); }
            60% { transform: translate(-3px, 2px) rotate(-0.3deg); }
            80% { transform: translate(3px, -2px) rotate(0.3deg); }
        }

        .shake {
            animation: screenShake 0.15s ease-in-out;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {
            .title-logo { font-size: 3rem; }
            .title-subtitle { font-size: 0.8rem; letter-spacing: 0.4em; }
            .title-btn { font-size: 1rem; padding: 1rem 2rem; }
            .song-title { font-size: 1rem; }
            .diff-btn .rating { font-size: 2rem; }
            .score-display { font-size: 1.8rem; }
            .combo-display { font-size: 1.5rem; }
            .judgment-display { font-size: 2.5rem; }
            .rank-display { font-size: 8rem; }
            .final-score { font-size: 2.5rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .touch-btn { width: 55px; height: 55px; font-size: 1rem; }
        }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 244, 255, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 244, 255, 0.5);
        }

        /* File input */
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Background Canvas -->
    <canvas id="bgCanvas"></canvas>

    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- File Input -->
    <input type="file" id="fileInput" accept=".mp3,.wav,.ogg,.m4a,audio/*">

    <!-- Title Screen -->
    <div id="titleScreen" class="screen active">
        <div class="title-logo">ARCADE</div>
        <div class="title-subtitle">Rhythm of Light</div>
        <button class="title-btn" id="btnUpload">📂 LOAD SONG</button>
        <button class="title-btn pink" id="btnDemo">▶ DEMO MODE</button>
    </div>

    <!-- Song Select Screen -->
    <div id="songSelectScreen" class="screen">
        <div class="song-select-header">SELECT SONG</div>
        <div class="song-list" id="songList">
            <!-- Songs will be added dynamically -->
        </div>
        <button class="back-btn" id="btnBackToTitle">← BACK</button>
    </div>

    <!-- Difficulty Screen -->
    <div id="difficultyScreen" class="screen">
        <div class="diff-select-header">SELECT DIFFICULTY</div>
        <div class="song-title-display" id="selectedSongTitle">Song Title</div>
        <div class="diff-buttons">
            <button class="diff-btn easy" data-diff="easy">
                <span class="rating">1-3</span>
                <span class="name">EASY</span>
            </button>
            <button class="diff-btn normal" data-diff="normal">
                <span class="rating">4-6</span>
                <span class="name">NORMAL</span>
            </button>
            <button class="diff-btn hard" data-diff="hard">
                <span class="rating">7-9</span>
                <span class="name">HARD</span>
            </button>
            <button class="diff-btn extreme" data-diff="extreme">
                <span class="rating">10-12</span>
                <span class="name">EXTREME</span>
            </button>
        </div>
        <button class="back-btn" id="btnBackToSongs" style="margin-top: 2rem;">← SONGS</button>
    </div>

    <!-- Loading Screen -->

// GAME DATA - LEADERBOARD SYSTEM
// ============================================================================
const LEADERBOARD = {
    getSongLeaderboard: function(songId, difficulty, limit = 100) {
        const key = `leaderboard_${songId}_${difficulty}`;
        const data = localStorage.getItem(key);
        if (!data) return [];
        
        try {
            const scores = JSON.parse(data);
            return scores.sort((a, b) => b.score - a.score).slice(0, limit);
        } catch (e) {
            return [];
        }
    },
    
    submitScore: function(songId, difficulty, scoreData) {
        const key = `leaderboard_${songId}_${difficulty}`;
        let scores = [];
        
        try {
            scores = JSON.parse(localStorage.getItem(key) || '[]');
        } catch (e) {
            scores = [];
        }
        
        scores.push({
            ...scoreData,
            timestamp: Date.now()
        });
        
        scores.sort((a, b) => b.score - a.score);
        scores = scores.slice(0, 1000);
        
        localStorage.setItem(key, JSON.stringify(scores));
        
        return {
            rank: scores.findIndex(s => s.timestamp === scoreData.timestamp) + 1,
            total: scores.length
        };
    },
    
    getPlayerRank: function(songId, difficulty, playerId) {
        const leaderboard = this.getSongLeaderboard(songId, difficulty);
        return leaderboard.findIndex(e => e.playerId === playerId) + 1;
    },
    
    getGlobalStats: function() {
        const keys = Object.keys(localStorage).filter(k => k.startsWith('leaderboard_'));
        let totalScores = 0;
        let uniquePlayers = new Set();
        
        keys.forEach(key => {
            try {
                const scores = JSON.parse(localStorage.getItem(key) || '[]');
                totalScores += scores.length;
                scores.forEach(s => {
                    if (s.playerId) uniquePlayers.add(s.playerId);
                });
            } catch (e) {}
        });
        
        return {
            totalScores,
            uniquePlayers: uniquePlayers.size
        };
    }
};

const REPLAY_SYSTEM = {
    currentReplay: null,
    recording: false,
    recordingData: {
        songId: null,
        difficulty: null,
        startTime: 0,
        inputs: [],
        metadata: {}
    },
    
    startRecording: function(songId, difficulty, metadata = {}) {
        this.recording = true;
        this.recordingData = {
            songId,
            difficulty,
            startTime: Date.now(),
            inputs: [],
            metadata
        };
    },
    
    recordInput: function(type, lane, timestamp, data = {}) {
        if (!this.recording) return;
        
        this.recordingData.inputs.push({
            type,
            lane,
            timestamp: timestamp || (Date.now() - this.recordingData.startTime),
            ...data
        });
    },
    
    stopRecording: function() {
        this.recording = false;
        return this.getRecording();
    },
    
    getRecording: function() {
        return {
            ...this.recordingData,
            duration: Date.now() - this.recordingData.startTime,
            inputCount: this.recordingData.inputs.length
        };
    },
    
    saveReplay: function(name) {
        const replay = this.getRecording();
        replay.name = name;
        replay.version = CONSTANTS.VERSION;
        
        const replays = this.getAllReplays();
        replays.push(replay);
        
        localStorage.setItem('replays', JSON.stringify(replays));
        return replay;
    },
    
    getAllReplays: function() {
        try {
            return JSON.parse(localStorage.getItem('replays') || '[]');
        } catch (e) {
            return [];
        }
    },
    
    loadReplay: function(index) {
        const replays = this.getAllReplays();
        return replays[index] || null;
    },
    
    deleteReplay: function(index) {
        const replays = this.getAllReplays();
        replays.splice(index, 1);
        localStorage.setItem('replays', JSON.stringify(replays));
    },
    
    exportReplay: function(replay) {
        const blob = new Blob([JSON.stringify(replay, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `arcade_replay_${replay.name}_${Date.now()}.replay`;
        a.click();
        URL.revokeObjectURL(url);
    },
    
    importReplay: function(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const replay = JSON.parse(e.target.result);
                    
                    if (!replay.songId || !replay.inputs) {
                        reject(new Error('Invalid replay file'));
                        return;
                    }
                    
                    const replays = this.getAllReplays();
                    replays.push(replay);
                    localStorage.setItem('replays', JSON.stringify(replays));
                    
                    resolve(replay);
                } catch (err) {
                    reject(err);
                }
            };
            reader.onerror = reject;
            reader.readAsText(file);
        });
    }
};

const EVENT_SYSTEM = {
    currentEvent: null,
    playerProgress: {},
    
    init: function() {
        this.loadProgress();
        this.checkCurrentEvent();
    },
    
    checkCurrentEvent: function() {
        const now = new Date();
        
        for (const event of EVENTS.active) {
            const start = new Date(event.startDate);
            const end = new Date(event.endDate);
            
            if (now >= start && now <= end) {
                this.currentEvent = event;
                break;
            }
        }
    },
    
    getEventBonus: function(type) {
        if (!this.currentEvent) return 1;
        return this.currentEvent.bonus.multiplier || 1;
    },
    
    updateProgress: function(type, amount) {
        if (!this.currentEvent) return;
        
        const key = `${this.currentEvent.id}_${type}`;
        this.playerProgress[key] = (this.playerProgress[key] || 0) + amount;
        this.saveProgress();
    },
    
    checkCompletion: function(challenge) {
        const key = `${this.currentEvent.id}_${challenge.id}`;
        const progress = this.playerProgress[key] || 0;
        
        if (progress >= challenge.target) {
            this.claimReward(challenge);
            return true;
        }
        return false;
    },
    
    claimReward: function(challenge) {
        const key = `${this.currentEvent.id}_${challenge.id}_claimed`;
        if (this.playerProgress[key]) return false;
        
        this.playerProgress[key] = true;
        
        switch (challenge.reward.type) {
            case 'currency':
                const currency = this.getCurrency();
                this.setCurrency(currency + challenge.reward.amount);
                break;
            case 'partner':
                unlockPartner(challenge.reward.partnerId);
                break;
        }
        
        this.saveProgress();
        return true;
    },
    
    loadProgress: function() {
        try {
            const data = localStorage.getItem('event_progress');
            this.playerProgress = data ? JSON.parse(data) : {};
        } catch (e) {
            this.playerProgress = {};
        }
    },
    
    saveProgress: function() {
        localStorage.setItem('event_progress', JSON.stringify(this.playerProgress));
    }
};

// GAME DATA - SONG PROGRESSION SYSTEM
// ============================================================================
const PROGRESSION_SYSTEM = {
    unlocks: {},
    
    init: function() {
        this.loadUnlocks();
    },
    
    checkSongUnlock: function(songId) {
        const song = SONGS_DATABASE.songs.find(s => s.id === songId);
        if (!song) return false;
        
        if (song.unlock.type === 'default') return true;
        
        const key = `song_unlock_${songId}`;
        return localStorage.getItem(key) === 'true';
    },
    
    tryUnlockSong: function(songId) {
        if (this.checkSongUnlock(songId)) return true;
        
        const song = SONGS_DATABASE.songs.find(s => s.id === songId);
        if (!song) return false;
        
        const unlock = song.unlock;
        let unlocked = false;
        
        switch (unlock.type) {
            case 'score':
                const songHighScore = this.getSongHighScore(unlock.songId);
                if (songHighScore >= unlock.score) unlocked = true;
                break;
                
            case 'play':
                const playCount = this.getTotalPlayCount();
                if (playCount >= unlock.playCount) unlocked = true;
                break;
                
            case 'achievement':
                if (this.checkAchievement(unlock.achievementId)) unlocked = true;
                break;
                
            case 'perfect':
                const songStats = this.getSongStats(unlock.songId);
                if (songStats && songStats.perfectRate >= unlock.perfectRate) unlocked = true;
                break;
                
            case 'combo':
                if (this.getMaxComboEver() >= unlock.combo) unlocked = true;
                break;
        }
        
        if (unlocked) {
            const key = `song_unlock_${songId}`;
            localStorage.setItem(key, 'true');
        }
        
        return unlocked;
    },
    
    getSongHighScore: function(songId) {
        const key = `song_score_${songId}`;
        return parseInt(localStorage.getItem(key) || '0');
    },
    
    setSongHighScore: function(songId, score) {
        const key = `song_score_${songId}`;
        const current = parseInt(localStorage.getItem(key) || '0');
        if (score > current) {
            localStorage.setItem(key, score.toString());
        }
    },
    
    markSongCleared: function(songId) {
        const key = `song_clear_${songId}`;
        localStorage.setItem(key, 'true');
    },
    
    isSongCleared: function(songId) {
        const key = `song_clear_${songId}`;
        return localStorage.getItem(key) === 'true';
    },
    
    getSongStats: function(songId) {
        const key = `song_stats_${songId}`;
        try {
            return JSON.parse(localStorage.getItem(key) || 'null');
        } catch (e) {
            return null;
        }
    },
    
    saveSongStats: function(songId, stats) {
        const key = `song_stats_${songId}`;
        const existing = this.getSongStats(songId) || {};
        
        const merged = {
            ...existing,
            ...stats,
            plays: (existing.plays || 0) + 1,
            highScore: Math.max(existing.highScore || 0, stats.score || 0),
            maxCombo: Math.max(existing.maxCombo || 0, stats.maxCombo || 0),
            bestPerfectRate: Math.max(existing.bestPerfectRate || 0, stats.perfectRate || 0)
        };
        
        localStorage.setItem(key, JSON.stringify(merged));
    },
    
    getTotalPlayCount: function() {
        let total = 0;
        SONGS_DATABASE.songs.forEach(song => {
            const stats = this.getSongStats(song.id);
            if (stats) total += stats.plays || 0;
        });
        return total;
    },
    
    getMaxComboEver: function() {
        let max = 0;
        SONGS_DATABASE.songs.forEach(song => {
            const stats = this.getSongStats(song.id);
            if (stats && stats.maxCombo > max) max = stats.maxCombo;
        });
        return max;
    },
    
    checkAchievement: function(achievementId) {
        const key = `achievement_${achievementId}`;
        return localStorage.getItem(key) === 'true';
    },
    
    unlockAchievement: function(achievementId) {
        const key = `achievement_${achievementId}`;
        if (localStorage.getItem(key) === 'true') return false;
        
        localStorage.setItem(key, 'true');
        
        const achievement = ACHIEVEMENTS_DATABASE.achievements.find(a => a.id === achievementId);
        if (achievement && achievement.reward) {
            this.claimAchievementReward(achievement.reward);
        }
        
        return true;
    },
    
    claimAchievementReward: function(reward) {
        switch (reward.type) {
            case 'partner':
                unlockPartner(reward.partnerId);
                break;
            case 'title':
                this.unlockTitle(reward.titleId);
                break;
            case 'song':
                this.tryUnlockSong(reward.songId);
                break;
        }
    },
    
    unlockTitle: function(titleId) {
        const key = `title_${titleId}`;
        localStorage.setItem(key, 'true');
    },
    
    loadUnlocks: function() {
        SONGS_DATABASE.songs.forEach(song => {
            if (song.unlock.type === 'default') {
                const key = `song_unlock_${song.id}`;
                localStorage.setItem(key, 'true');
            }
        });
    }
};

    currencyKey: 'player_currency',
    purchasesKey: 'purchased_items',
    
    getCurrency: function() {
        return parseInt(localStorage.getItem(this.currencyKey) || '0');
    },
    
    setCurrency: function(amount) {
        localStorage.setItem(this.currencyKey, amount.toString());
    },
    
    addCurrency: function(amount) {
        const current = this.getCurrency();
        this.setCurrency(current + amount);
        return this.getCurrency();
    },
    
    spendCurrency: function(amount) {
        const current = this.getCurrency();
        if (current < amount) return false;
        
        this.setCurrency(current - amount);
        return true;
    },
    
    canAfford: function(amount) {
        return this.getCurrency() >= amount;
    },
    
    getPurchases: function() {
        try {
            return JSON.parse(localStorage.getItem(this.purchasesKey) || '[]');
        } catch (e) {
            return [];
        }
    },
    
    hasPurchased: function(itemId) {
        return this.getPurchases().includes(itemId);
    },
    
    purchase: function(itemId, cost, onPurchase = null) {
        if (this.hasPurchased(itemId)) return false;
        if (!this.spendCurrency(cost)) return false;
        
        const purchases = this.getPurchases();
        purchases.push(itemId);
        localStorage.setItem(this.purchasesKey, JSON.stringify(purchases));
        
        if (onPurchase) onPurchase();
        
        return true;

const COMMUNITY = {
    // Friend System
    friends: {
        maxFriends: 50,
        requests: [],
        list: [],
        
        sendFriendRequest: function(playerId, message = '') {
            if (this.list.length >= this.maxFriends) return false;
            if (this.isFriend(playerId)) return false;
            if (this.hasPendingRequest(playerId)) return false;
            
            this.requests.push({
                from: playerId,
                message,
                timestamp: Date.now()
            });
            return true;
        },
        
        acceptRequest: function(playerId) {
            const index = this.requests.findIndex(r => r.from === playerId);
            if (index === -1) return false;
            
            this.requests.splice(index, 1);
            this.list.push(playerId);
            return true;
        },
        
        rejectRequest: function(playerId) {
            const index = this.requests.findIndex(r => r.from === playerId);
            if (index === -1) return false;
            
            this.requests.splice(index, 1);
            return true;
        },
        
        removeFriend: function(playerId) {
            const index = this.list.indexOf(playerId);
            if (index === -1) return false;
            
            this.list.splice(index, 1);
            return true;
        },
        
        isFriend: function(playerId) {
            return this.list.includes(playerId);
        },
        
        hasPendingRequest: function(playerId) {
            return this.requests.some(r => r.from === playerId);
        }
    },
    
    // Messaging System
    messages: {
        inbox: [],
        sent: [],
        unread: 0,
        
        sendMessage: function(to, subject, body) {
            const message = {
                id: 'msg_' + Date.now(),
                from: 'player',
                to,
                subject,
                body,
                timestamp: Date.now(),
                read: false
            };
            
            this.sent.push(message);
            return message;
        },
        
        getInbox: function() {
            return this.inbox.sort((a, b) => b.timestamp - a.timestamp);
        },
        
        markAsRead: function(messageId) {
            const message = this.inbox.find(m => m.id === messageId);
            if (message) {
                message.read = true;
                this.unread = this.inbox.filter(m => !m.read).length;
            }
        },
        
        deleteMessage: function(messageId) {
            this.inbox = this.inbox.filter(m => m.id !== messageId);
            this.sent = this.sent.filter(m => m.id !== messageId);
        }
    },
    
    // Profile System
    profile: {
        playerId: 'player_' + Math.random().toString(36).substr(2, 9),
        displayName: 'Player',
        bio: '',
        avatar: null,
        country: null,
        level: 1,
        experience: 0,
        rank: 'Bronze',
        joinDate: Date.now(),
        
        experienceToNextLevel: function() {
            return Math.floor(100 * Math.pow(1.5, this.level));
        },
        
        addExperience: function(amount) {
            this.experience += amount;
            
            while (this.experience >= this.experienceToNextLevel()) {
                this.experience -= this.experienceToNextLevel();
                this.level++;
                this.updateRank();
            }
            
            return { leveled: this.experience < amount, newLevel: this.level };
        },
        
        updateRank: function() {
            const ranks = [
                { name: 'Bronze', minLevel: 1 },
                { name: 'Silver', minLevel: 10 },
                { name: 'Gold', minLevel: 25 },
                { name: 'Platinum', minLevel: 50 },
                { name: 'Diamond', minLevel: 75 },
                { name: 'Master', minLevel: 100 }
            ];
            
            for (let i = ranks.length - 1; i >= 0; i--) {
                if (this.level >= ranks[i].minLevel) {
                    this.rank = ranks[i].name;
                    break;
                }
            }
        },
        
        setAvatar: function(imageData) {
            this.avatar = imageData;
        }
    },
    
    // Activity Feed
    activity: {
        feed: [],
        maxItems: 100,
        
        addActivity: function(type, data) {
            const activity = {
                id: 'act_' + Date.now(),
                type,
                data,
                timestamp: Date.now()
            };
            
            this.feed.unshift(activity);
            
            if (this.feed.length > this.maxItems) {
                this.feed.pop();
            }
            
            return activity;
        },
        
        getFeed: function(limit = 20) {
            return this.feed.slice(0, limit);
        },
        
        getActivityTypes: function() {
            return [...new Set(this.feed.map(a => a.type))];
        }
    }
};

    },

    },

        return Date.now() - this.sessionData.startTime;
    },
    
    getSessionStats: function() {
        return {
            duration: this.getSessionDuration(),
            plays: this.sessionData.playsThisSession,
            topScores: this.sessionData.topScores
        };
    },
    
    heatmapData: {
        dayOfWeek: [0, 0, 0, 0, 0, 0, 0],
        hourOfDay: new Array(24).fill(0),
        
        recordPlay: function() {
            const now = new Date();
            this.dayOfWeek[now.getDay()]++;
            this.hourOfDay[now.getHours()]++;
        },
        
        getBestTimeToPlay: function() {
            let bestHour = 0;
            let maxPlays = 0;
            
            this.hourOfDay.forEach((plays, hour) => {
                if (plays > maxPlays) {
                    maxPlays = plays;
                    bestHour = hour;
                }
            });
            
            return { hour: bestHour, plays: maxPlays };
        },
        
        getBestDayToPlay: function() {
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            let bestDay = 0;
            let maxPlays = 0;
            
            this.dayOfWeek.forEach((plays, day) => {
                if (plays > maxPlays) {
                    maxPlays = plays;
                    bestDay = day;
                }
            });
            
            return { day: days[bestDay], plays: maxPlays };
        }
    },
    
    skillProgression: {
        tapAccuracy: [],
        holdAccuracy: [],
        flickAccuracy: [],
        
        recordJudgment: function(type, timing) {
            const data = {
                type,
                timing,
                timestamp: Date.now()
            };
            
            switch (type) {
                case 'tap':
                    this.tapAccuracy.push(data);
                    break;
                case 'hold':
                    this.holdAccuracy.push(data);
                    break;
                case 'flick':
                    this.flickAccuracy.push(data);
                    break;
            }
        },
        
        getAccuracyTrend: function(type, samples = 50) {
            let data;
            
            switch (type) {
                case 'tap': data = this.tapAccuracy; break;
                case 'hold': data = this.holdAccuracy; break;
                case 'flick': data = this.flickAccuracy; break;
                default: return 0;
            }
            
            const recent = data.slice(-samples);
            if (recent.length === 0) return 0;
            
            const sum = recent.reduce((acc, d) => acc + d.timing, 0);
            return sum / recent.length;
        },
        
        getWeaknesses: function() {
            return {
                tap: this.getAccuracyTrend('tap') > 50,
                hold: this.getAccuracyTrend('hold') > 50,
                flick: this.getAccuracyTrend('flick') > 50
            };
        }
    }
};

const NOTIFICATION_SYSTEM = {
    notifications: [],
    unreadCount: 0,
    maxNotifications: 100,
    
    add: function(type, title, message, data = {}) {
        const notification = {
            id: 'notif_' + Date.now(),
            type,
            title,
            message,
            data,
            timestamp: Date.now(),
            read: false,
            dismissed: false
        };
        
        this.notifications.unshift(notification);
        
        if (this.notifications.length > this.maxNotifications) {
            this.notifications.pop();
        }
        
        this.updateUnreadCount();
        this.save();
        
        return notification;
    },
    
    markAsRead: function(id) {
        const notification = this.notifications.find(n => n.id === id);
        if (notification && !notification.read) {
            notification.read = true;
            this.updateUnreadCount();
            this.save();
        }
    },
    
    markAllAsRead: function() {
        this.notifications.forEach(n => n.read = true);
        this.updateUnreadCount();
        this.save();
    },
    
    dismiss: function(id) {
        const notification = this.notifications.find(n => n.id === id);
        if (notification) {
            notification.dismissed = true;
            this.updateUnreadCount();
            this.save();
        }
    },
    
    dismissAll: function() {
        this.notifications.forEach(n => n.dismissed = true);
        this.save();
    },
    
    updateUnreadCount: function() {
        this.unreadCount = this.notifications.filter(n => !n.read && !n.dismissed).length;
    },
    
    getActive: function() {
        return this.notifications.filter(n => !n.dismissed);
    },
    
    clear: function() {
        this.notifications = [];
        this.unreadCount = 0;
        this.save();
    },
    
    save: function() {
        localStorage.setItem('notifications', JSON.stringify(this.notifications));
    },
    
    load: function() {
        try {
            const data = localStorage.getItem('notifications');
            if (data) {
                this.notifications = JSON.parse(data);
                this.updateUnreadCount();
            }
        } catch (e) {
            console.error('Failed to load notifications:', e);

// GAME DATA - PLAYER STATISTICS AGGREGATOR
// ============================================================================
const PLAYER_STATS = {
    allTime: {
        totalPlays: 0,
        totalPerfects: 0,
        totalGreats: 0,
        totalGoods: 0,
        totalMisses: 0,
        totalScore: 0,
        totalPlayTime: 0,
        maxCombo: 0,
        bestAccuracy: 0,
        songsCleared: 0,
        perfectSongs: 0,
        rankDistribution: { S: 0, A: 0, B: 0, C: 0, D: 0 }
    },
    
    weekly: {
        plays: 0,
        score: 0,
        perfects: 0,
        averageAccuracy: 0
    },
    
    daily: {
        plays: 0,
        score: 0,
        perfects: 0,
        averageAccuracy: 0
    },
    
    updateFromGame: function(gameStats) {
        this.allTime.totalPlays++;
        this.allTime.totalPerfects += gameStats.perfect;
        this.allTime.totalGreats += gameStats.great;
        this.allTime.totalGoods += gameStats.good;
        this.allTime.totalMisses += gameStats.miss;
        this.allTime.totalScore += gameStats.score;
        this.allTime.totalPlayTime += gameStats.playTime || 0;
        this.allTime.maxCombo = Math.max(this.allTime.maxCombo, gameStats.maxCombo);
        
        const accuracy = gameStats.accuracy;
        this.allTime.bestAccuracy = Math.max(this.allTime.bestAccuracy, accuracy);
        
        if (gameStats.cleared) this.allTime.songsCleared++;
        if (accuracy >= 97) this.allTime.perfectSongs++;
        
        const rank = this.calculateRank(accuracy);
        if (this.allTime.rankDistribution[rank] !== undefined) {
            this.allTime.rankDistribution[rank]++;
        }
        
        this.weekly.plays++;
        this.weekly.score += gameStats.score;
        this.weekly.perfects += gameStats.perfect;
        
        this.daily.plays++;
        this.daily.score += gameStats.score;
        this.daily.perfects += gameStats.perfect;
        
        this.save();
    },
    
    calculateRank: function(accuracy) {
        if (accuracy >= 97) return 'S';
        if (accuracy >= 93) return 'A';
        if (accuracy >= 85) return 'B';
        if (accuracy >= 75) return 'C';
        return 'D';
    },
    
    getAverageAccuracy: function() {
        const total = this.allTime.totalPerfects + this.allTime.totalGreats + 
                      this.allTime.totalGoods + this.allTime.totalMisses;
        if (total === 0) return 0;
        
        const weighted = this.allTime.totalPerfects * 1.0 + 
                        this.allTime.totalGreats * 0.8 + 
                        this.allTime.totalGoods * 0.5;
        
        return (weighted / total) * 100;
    },
    
    getStatistics: function() {
        return {
            allTime: { ...this.allTime },
            weekly: { ...this.weekly },
            daily: { ...this.daily },
            averageAccuracy: this.getAverageAccuracy()
        };
    },
    
    resetWeekly: function() {
        this.weekly = { plays: 0, score: 0, perfects: 0, averageAccuracy: 0 };
    },
    
    resetDaily: function() {
        this.daily = { plays: 0, score: 0, perfects: 0, averageAccuracy: 0 };
    },
    
    save: function() {
        localStorage.setItem('player_stats', JSON.stringify({
            allTime: this.allTime,
            weekly: this.weekly,
            daily: this.daily
        }));
    },
    
    load: function() {
        try {
            const data = localStorage.getItem('player_stats');
            if (data) {
                const parsed = JSON.parse(data);
                this.allTime = { ...this.allTime, ...parsed.allTime };
                this.weekly = { ...this.weekly, ...parsed.weekly };
                this.daily = { ...this.daily, ...parsed.daily };
            }
        } catch (e) {
            console.error('Failed to load player stats:', e);
        }
    }
};

const SOCIAL_FEATURES = {
    shareEnabled: true,
    shareText: {
        perfect: '🎮 Got {score} points with {accuracy}% accuracy in ARCADE! Can you beat my score?',
        rank: '🏆 Achieved {rank} rank in ARCADE! Level {level} player reporting!',
        combo: '🔥 Hit a {combo} combo in ARCADE! That\'s insane!',
        clear: '✅ Just cleared {song} on {difficulty} difficulty in ARCADE!'
    },
    
    getShareText: function(type, data) {
        if (!this.shareEnabled) return '';
        
        let text = this.shareText[type] || '';
        
        Object.keys(data).forEach(key => {
            text = text.replace(`{${key}}`, data[key]);
        });
        
        return text;
    },
    
    shareToClipboard: async function(type, data) {
        const text = this.getShareText(type, data);
        if (!text) return false;
        
        try {
            await navigator.clipboard.writeText(text);
            return true;
        } catch (e) {
            console.error('Failed to copy to clipboard:', e);

// ============================================================================
// GAME DATA - PERFORMANCE MONITORING
// ============================================================================
const PERFORMANCE_MONITOR = {
    metrics: {
        fps: [],
        frameTime: [],
        memory: [],
        droppedFrames: 0,
        totalFrames: 0
    },
    
    lastFrameTime: 0,
    frameCount: 0,
    
    startFrame: function() {
        this.frameStart = performance.now();
    },
    
    endFrame: function() {
        const frameTime = performance.now() - this.frameStart;
        this.frameCount++;
        this.totalFrames++;
        
        this.metrics.frameTime.push(frameTime);
        if (this.metrics.frameTime.length > 60) {
            this.metrics.frameTime.shift();
        }
        
        const fps = 1000 / frameTime;
        this.metrics.fps.push(fps);
        if (this.metrics.fps.length > 60) {
            this.metrics.fps.shift();
        }
        
        if (frameTime > 20) { // More than 50fps frame time
            this.metrics.droppedFrames++;
        }
        
        if (performance.memory) {
            this.metrics.memory.push(performance.memory.usedJSHeapSize);
            if (this.metrics.memory.length > 60) {
                this.metrics.memory.shift();
            }
        }
    },
    
    getAverageFPS: function() {
        if (this.metrics.fps.length === 0) return 0;
        return this.metrics.fps.reduce((a, b) => a + b, 0) / this.metrics.fps.length;
    },
    
    getAverageFrameTime: function() {
        if (this.metrics.frameTime.length === 0) return 0;
        return this.metrics.frameTime.reduce((a, b) => a + b, 0) / this.metrics.frameTime.length;
    },
    
    getMemoryUsage: function() {
        if (this.metrics.memory.length === 0) return 0;
        return this.metrics.memory[this.metrics.memory.length - 1];
    },
    
    getDroppedFrameRate: function() {
        if (this.totalFrames === 0) return 0;
        return (this.metrics.droppedFrames / this.totalFrames) * 100;
    },
    
    getReport: function() {
        return {
            averageFPS: this.getAverageFPS().toFixed(1),
            averageFrameTime: this.getAverageFrameTime().toFixed(2),
            memoryUsage: (this.getMemoryUsage() / 1024 / 1024).toFixed(2) + ' MB',
            droppedFrameRate: this.getDroppedFrameRate().toFixed(2) + '%',
            totalFrames: this.totalFrames
        };
    }
};

// Debug: Test BPM detection
function debugTestBPM() {
    // Create a test audio context
    const ctx = new AudioContext();
    const sampleRate = ctx.sampleRate;
    const duration = 10; // 10 seconds
    const buffer = ctx.createBuffer(1, sampleRate * duration, sampleRate);
    const data = buffer.getChannelData(0);
    
    // Generate a 120 BPM test signal
    const bpm = 120;
    const frequency = bpm / 60;
    
    for (let i = 0; i < data.length; i++) {
        const t = i / sampleRate;
        // Simple sine wave at beat frequency
        data[i] = Math.sin(2 * Math.PI * frequency * t) * 0.5;
    }
    
    console.log('Test signal generated at', bpm, 'BPM');
    return buffer;
}

// Debug: Generate test chart
function debugGenerateTestChart(bpm, duration, density) {
    const notes = [];
    const beatInterval = 60 / bpm;
    
    for (let time = beatInterval; time < duration; time += beatInterval) {
        if (Math.random() < density) {
            notes.push({
                time,
                lane: Math.floor(Math.random() * 4),
                type: Math.random() < 0.2 ? 'hold' : 'tap',
                hit: false,
                missed: false
            });
        }
    }
    
    return notes;
}

// Debug: Performance test
function debugPerformanceTest(duration = 10) {
    const startTime = performance.now();
    const frames = [];
    
    function frame() {
        const now = performance.now();
        frames.push(now - startTime);
        
        if (now - startTime < duration * 1000) {
            requestAnimationFrame(frame);
        } else {
            const avgFrameTime = frames.reduce((a, b) => a + b, 0) / frames.length;
            const fps = 1000 / avgFrameTime;
            console.log('Performance test results:');
            console.log('Total frames:', frames.length);
            console.log('Average frame time:', avgFrameTime.toFixed(2), 'ms');
            console.log('Average FPS:', fps.toFixed(2));
        }
    }
    
    requestAnimationFrame(frame);
}

// ============================================================================
// STORAGE MANAGER - SAVE/LOAD GAME DATA
// ============================================================================
class StorageManager {
    constructor() {
        this.storageKey = 'arcade_game_data';
        this.dataVersion = CONSTANTS.VERSION;
    }
    
    save(gameState) {
        try {
            const saveData = {
                version: this.dataVersion,
                timestamp: Date.now(),
                stats: gameState.stats,
                unlockedSongs: gameState.unlockedSongs,
                unlockedPartners: gameState.unlockedPartners,
                unlockedAchievements: gameState.unlockedAchievements,
                settings: gameState.settings,
                highScores: gameState.highScores,
                statistics: gameState.statistics,
                selectedPartner: gameState.selectedPartner,
                currentTitle: gameState.currentTitle
            };
            
            localStorage.setItem(this.storageKey, JSON.stringify(saveData));
            return true;
        } catch (error) {
            console.error('Failed to save game data:', error);
            return false;
        }
    }
    
    load() {
        try {
            const saved = localStorage.getItem(this.storageKey);
            if (!saved) return null;
            
            const data = JSON.parse(saved);
            
            // Version check
            if (data.version !== this.dataVersion) {
                // Handle migration if needed
                console.log('Migrating save data from version', data.version, 'to', this.dataVersion);
            }
            
            return data;
        } catch (error) {
            console.error('Failed to load game data:', error);
            return null;
        }
    }
    
    reset() {
        try {
            localStorage.removeItem(this.storageKey);
            return true;
        } catch (error) {
            console.error('Failed to reset game data:', error);
            return false;
        }
    }
    
    export() {
        const data = this.load();
        if (!data) return null;
        
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = `arcade_backup_${Date.now()}.json`;
        a.click();
        
        URL.revokeObjectURL(url);
    }
    
    import(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    localStorage.setItem(this.storageKey, JSON.stringify(data));
                    resolve(data);
                } catch (error) {
                    reject(error);
                }
            };
            reader.onerror = reject;
            reader.readAsText(file);
        });
    }
}
