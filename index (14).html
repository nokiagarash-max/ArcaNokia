// ============================================================================
// UI MANAGER SYSTEM
// ============================================================================
class UIManager {
    constructor() {
        this.screens = {};
        this.transitions = {};
        this.animations = [];
        this.modalStack = [];
        this.toastQueue = [];
    }

    registerScreen(id, screen) {
        this.screens[id] = screen;
    }

    transition(fromId, toId, type = 'fade', duration = 300) {
        const from = this.screens[fromId];
        const to = this.screens[toId];

        if (!from || !to) return;

        switch (type) {
            case 'fade':
                this.fadeTransition(from, to, duration);
                break;
            case 'slide':
                this.slideTransition(from, to, duration);
                break;
            case 'zoom':
                this.zoomTransition(from, to, duration);
                break;
            case 'wipe':
                this.wipeTransition(from, to, duration);
                break;
        }
    }

    fadeTransition(from, to, duration) {
        from.style.opacity = '0';
        to.style.opacity = '1';
        to.style.display = 'flex';
        
        setTimeout(() => {
            from.style.display = 'none';
        }, duration);
    }

    slideTransition(from, to, duration, direction = 'left') {
        const delta = direction === 'left' ? '100%' : '-100%';
        
        to.style.transform = `translateX(${delta})`;
        to.style.display = 'flex';
        to.style.transition = `transform ${duration}ms ease`;
        
        requestAnimationFrame(() => {
            to.style.transform = 'translateX(0)';
            from.style.transform = `translateX(${-delta})`;
        });

        setTimeout(() => {
            from.style.display = 'none';
            from.style.transform = '';
            to.style.transition = '';
        }, duration);
    }

    zoomTransition(from, to, duration) {
        from.style.transform = 'scale(1)';
        from.style.opacity = '1';
        
        to.style.transform = 'scale(0.8)';
        to.style.opacity = '0';
        to.style.display = 'flex';
        
        requestAnimationFrame(() => {
            to.style.transition = `all ${duration}ms ease`;
            to.style.transform = 'scale(1)';
            to.style.opacity = '1';
            from.style.transform = 'scale(1.1)';
            from.style.opacity = '0';
        });

        setTimeout(() => {
            from.style.display = 'none';
            from.style.transform = '';
            from.style.opacity = '';
            to.style.transition = '';
        }, duration);
    }

    wipeTransition(from, to, duration, direction = 'up') {
        const delta = direction === 'up' ? '-100%' : '100%';
        
        to.style.clipPath = `inset(0 0 100% 0)`;
        to.style.display = 'flex';
        
        requestAnimationFrame(() => {
            to.style.transition = `clip-path ${duration}ms ease`;
            to.style.clipPath = 'inset(0 0 0% 0)';
            from.style.clipPath = `inset(100% 0 0 0)`;
        });

        setTimeout(() => {
            from.style.display = 'none';
            from.style.clipPath = '';
            to.style.transition = '';
        }, duration);
    }

    showModal(modalId, options = {}) {
        const modal = document.getElementById(modalId);
        if (!modal) return;

        modal.style.display = 'flex';
        modal.style.opacity = '0';

        requestAnimationFrame(() => {
            modal.style.transition = 'opacity 200ms ease';
            modal.style.opacity = '1';
        });

        if (options.backdrop) {
            this.showBackdrop(options.backdropColor || 'rgba(0,0,0,0.8)');
        }

        this.modalStack.push(modalId);
    }

    hideModal(modalId) {
        const modal = document.getElementById(modalId);
        if (!modal) return;

        modal.style.opacity = '0';

        setTimeout(() => {
            modal.style.display = 'none';
        }, 200);

        this.hideBackdrop();
        this.modalStack = this.modalStack.filter(id => id !== modalId);
    }

    showBackdrop(color = 'rgba(0,0,0,0.8)') {
        let backdrop = document.getElementById('uiBackdrop');
        if (!backdrop) {
            backdrop = document.createElement('div');
            backdrop.id = 'uiBackdrop';
            backdrop.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: ${color};
                z-index: 999;
                pointer-events: auto;
            `;
            document.body.appendChild(backdrop);
        }
    }

    hideBackdrop() {
        const backdrop = document.getElementById('uiBackdrop');
        if (backdrop && this.modalStack.length === 0) {
            backdrop.style.opacity = '0';
            setTimeout(() => backdrop.remove(), 200);
        }
    }

    showToast(message, type = 'info', duration = 3000) {
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.innerHTML = message;
        toast.style.cssText = `
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 12px 24px;
            background: ${this.getToastColor(type)};
            color: white;
            border-radius: 8px;
            font-family: 'Exo 2', sans-serif;
            font-size: 14px;
            z-index: 10000;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        `;

        document.body.appendChild(toast);

        requestAnimationFrame(() => {
            toast.style.transform = 'translateX(-50%) translateY(0)';
            toast.style.opacity = '1';
        });

        setTimeout(() => {
            toast.style.transform = 'translateX(-50%) translateY(100px)';
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, duration);
    }

    getToastColor(type) {
        const colors = {
            info: '#00f4ff',
            success: '#00ff88',
            warning: '#ffaa00',
            error: '#ff3366'
        };
        return colors[type] || colors.info;
    }

    animate(element, keyframes, options = {}) {
        const duration = options.duration || 300;
        const easing = options.easing || 'ease';
        
        return new Promise(resolve => {
            element.style.transition = `all ${duration}ms ${easing}`;
            
            Object.entries(keyframes).forEach(([prop, value]) => {
                element.style[prop] = value;
            });

            setTimeout(() => {
                element.style.transition = '';
                resolve();
            }, duration);
        });
    }

    pulse(element, scale = 1.1, duration = 150) {
        const original = element.style.transform;
        element.style.transition = `transform ${duration}ms ease`;
        element.style.transform = `scale(${scale})`;

        setTimeout(() => {
            element.style.transform = original;
            setTimeout(() => {
                element.style.transition = '';
            }, duration);
        }, duration);
    }

    shake(element, intensity = 5, duration = 300) {
        const original = element.style.transform;
        const frames = duration / 16;
        let frame = 0;

        const shakeAnimation = () => {
            if (frame >= frames) {
                element.style.transform = original;
                return;
            }

            const x = (Math.random() - 0.5) * intensity * 2;
            const y = (Math.random() - 0.5) * intensity * 2;
            element.style.transform = `translate(${x}px, ${y}px)`;

            frame++;
            requestAnimationFrame(shakeAnimation);
        };

        shakeAnimation();
    }

    createLoadingSpinner(color = '#00f4ff') {
        const spinner = document.createElement('div');
        spinner.className = 'loading-spinner';
        spinner.innerHTML = `
            <svg width="40" height="40" viewBox="0 0 40 40">
                <circle cx="20" cy="20" r="18" fill="none" stroke="${color}" stroke-width="2" opacity="0.3"/>
                <circle cx="20" cy="20" r="18" fill="none" stroke="${color}" stroke-width="2" 
                    stroke-dasharray="80 40" stroke-linecap="round">
                    <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="1s" repeatCount="indefinite"/>
                </circle>
            </svg>
        `;
        return spinner;
    }
}

// ============================================================================
// INPUT MANAGER SYSTEM
// ============================================================================
class InputManager {
    constructor() {
        this.keys = {};
        this.keyStates = {};
        this.touches = {};
        this.mouseState = {
            x: 0,
            y: 0,
            down: false,
            button: -1
        };
        this.gamepads = [];
        this.vibration = { left: 0, right: 0 };
        this.callbacks = {
            keydown: [],
            keyup: [],
            touchstart: [],
            touchmove: [],
            touchend: [],
            mousedown: [],
            mouseup: [],
            mousemove: [],
            gamepadconnected: [],
            gamepaddisconnected: []
        };
        
        this.init();
    }

    init() {
        document.addEventListener('keydown', e => this.onKeyDown(e));
        document.addEventListener('keyup', e => this.onKeyUp(e));
        document.addEventListener('touchstart', e => this.onTouchStart(e), { passive: false });
        document.addEventListener('touchmove', e => this.onTouchMove(e), { passive: false });
        document.addEventListener('touchend', e => this.onTouchEnd(e), { passive: false });
        document.addEventListener('mousedown', e => this.onMouseDown(e));
        document.addEventListener('mouseup', e => this.onMouseUp(e));
        document.addEventListener('mousemove', e => this.onMouseMove(e));
        window.addEventListener('gamepadconnected', e => this.onGamepadConnected(e));
        window.addEventListener('gamepaddisconnected', e => this.onGamepadDisconnected(e));
        
        this.updateGamepads();
    }

    onKeyDown(e) {
        if (this.keys[e.code]) return;
        
        this.keys[e.code] = true;
        this.keyStates[e.code] = {
            pressed: true,
            held: true,
            time: performance.now()
        };
        
        this.callbacks.keydown.forEach(cb => cb(e));
    }

    onKeyUp(e) {
        this.keys[e.code] = false;
        if (this.keyStates[e.code]) {
            this.keyStates[e.code].held = false;
            this.keyStates[e.code].released = true;
            this.keyStates[e.code].releaseTime = performance.now();
        }
        
        this.callbacks.keyup.forEach(cb => cb(e));
    }

    onTouchStart(e) {
        e.preventDefault();
        
        for (const touch of e.changedTouches) {
            this.touches[touch.identifier] = {
                x: touch.clientX,
                y: touch.clientY,
                startX: touch.clientX,
                startY: touch.clientY,
                startTime: performance.now(),
                deltaX: 0,
                deltaY: 0
            };
            
            this.callbacks.touchstart.forEach(cb => cb(touch, this.touches[touch.identifier]));
        }
    }

    onTouchMove(e) {
        e.preventDefault();
        
        for (const touch of e.changedTouches) {
            const data = this.touches[touch.identifier];
            if (data) {
                data.deltaX = touch.clientX - data.x;
                data.deltaY = touch.clientY - data.y;
                data.x = touch.clientX;
                data.y = touch.clientY;
                
                this.callbacks.touchmove.forEach(cb => cb(touch, data));
            }
        }
    }

    onTouchEnd(e) {
        e.preventDefault();
        
        for (const touch of e.changedTouches) {
            const data = this.touches[touch.identifier];
            if (data) {
                data.duration = performance.now() - data.startTime;
                this.callbacks.touchend.forEach(cb => cb(touch, data));
                delete this.touches[touch.identifier];
            }
        }
    }

    onMouseDown(e) {
        this.mouseState.down = true;
        this.mouseState.button = e.button;
        this.callbacks.mousedown.forEach(cb => cb(e, this.mouseState));
    }

    onMouseUp(e) {
        this.mouseState.down = false;
        this.mouseState.button = -1;
        this.callbacks.mouseup.forEach(cb => cb(e, this.mouseState));
    }

    onMouseMove(e) {
        this.mouseState.x = e.clientX;
        this.mouseState.y = e.clientY;
        this.callbacks.mousemove.forEach(cb => cb(e, this.mouseState));
    }

    onGamepadConnected(e) {
        this.gamepads.push(e.gamepad);
        this.callbacks.gamepadconnected.forEach(cb => cb(e.gamepad));
    }

    onGamepadDisconnected(e) {
        this.gamepads = this.gamepads.filter(gp => gp.index !== e.gamepad.index);
        this.callbacks.gamepaddisconnected.forEach(cb => cb(e.gamepad));
    }

    updateGamepads() {
        this.gamepads = navigator.getGamepads ? Array.from(navigator.getGamepads()) : [];
        requestAnimationFrame(() => this.updateGamepads());
    }

    isKeyDown(code) {
        return !!this.keys[code];
    }

    isKeyJustPressed(code) {
        const state = this.keyStates[code];
        return state && state.pressed;
    }

    isKeyJustReleased(code) {
        const state = this.keyStates[code];
        return state && state.released;
    }

    getKeyHoldDuration(code) {
        const state = this.keyStates[code];
        if (!state) return 0;
        if (state.held) {
            return performance.now() - state.time;
        }
        return state.releaseTime - state.time;
    }

    getTouch(id) {
        return this.touches[id];
    }

    getGamepad(index = 0) {
        return this.gamepads[index];
    }

    on(event, callback) {
        if (this.callbacks[event]) {
            this.callbacks[event].push(callback);
        }
    }

    off(event, callback) {
        if (this.callbacks[event]) {
            this.callbacks[event] = this.callbacks[event].filter(cb => cb !== callback);
        }
    }

    vibrate(duration = 100, weak = 0.5, strong = 0.5) {
        if ('vibrate' in navigator) {
            navigator.vibrate([duration, 50, duration]);
        }
        
        this.gamepads.forEach(gamepad => {
            if (gamepad.vibrationActuator) {
                gamepad.vibrationActuator.playEffect('dual-rumble', {
                    startDelay: 0,
                    duration: duration,
                    weakMagnitude: weak,
                    strongMagnitude: strong
                });
            }
        });
    }

    resetKeyStates() {
        Object.keys(this.keyStates).forEach(code => {
            this.keyStates[code].pressed = false;
            this.keyStates[code].released = false;
        });
    }
}

// ============================================================================
// ANIMATION SYSTEM
// ============================================================================
class AnimationSystem {
    constructor() {
        this.animations = [];
        this.tweens = [];
        this.easings = this.getEasings();
    }

    getEasings() {
        return {
            linear: t => t,
            easeInQuad: t => t * t,
            easeOutQuad: t => t * (2 - t),
            easeInOutQuad: t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t,
            easeInCubic: t => t * t * t,
            easeOutCubic: t => (--t) * t * t + 1,
            easeInOutCubic: t => t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1,
            easeInQuart: t => t * t * t * t,
            easeOutQuart: t => 1 - (--t) * t * t * t,
            easeInOutQuart: t => t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t,
            easeInQuint: t => t * t * t * t * t,
            easeOutQuint: t => 1 + (--t) * t * t * t * t,
            easeInOutQuint: t => t < 0.5 ? 16 * t * t * t * t * t : 1 + 16 * (--t) * t * t * t * t,
            easeInSine: t => 1 - Math.cos(t * Math.PI / 2),
            easeOutSine: t => Math.sin(t * Math.PI / 2),
            easeInOutSine: t => -(Math.cos(Math.PI * t) - 1) / 2,
            easeInExpo: t => t === 0 ? 0 : Math.pow(2, 10 * t - 10),
            easeOutExpo: t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t),
            easeInOutExpo: t => t === 0 ? 0 : t === 1 ? 1 : t < 0.5 ? Math.pow(2, 20 * t - 10) / 2 : (2 - Math.pow(2, -20 * t + 10)) / 2,
            easeInCirc: t => 1 - Math.sqrt(1 - Math.pow(t, 2)),
            easeOutCirc: t => Math.sqrt(1 - Math.pow(t - 1, 2)),
            easeInOutCirc: t => t < 0.5 ? (1 - Math.sqrt(1 - Math.pow(2 * t, 2))) / 2 : (Math.sqrt(1 - Math.pow(-2 * t + 2, 2)) + 1) / 2,
            easeInBack: t => {
                const c1 = 1.70158;
                const c3 = c1 + 1;
                return c3 * t * t * t - c1 * t * t;
            },
            easeOutBack: t => {
                const c1 = 1.70158;
                const c3 = c1 + 1;
                return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
            },
            easeInOutBack: t => {
                const c1 = 1.70158;
                const c2 = c1 * 1.525;
                return t < 0.5 ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2 : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
            },
            easeInElastic: t => {
                const c4 = (2 * Math.PI) / 3;
                return t === 0 ? 0 : t === 1 ? 1 : -Math.pow(2, 10 * t - 10) * Math.sin((t * 10 - 10.75) * c4);
            },
            easeOutElastic: t => {
                const c4 = (2 * Math.PI) / 3;
                return t === 0 ? 0 : t === 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
            },
            easeInOutElastic: t => {
                const c5 = (2 * Math.PI) / 4.5;
                return t === 0 ? 0 : t === 1 ? 1 : t < 0.5 ? -(Math.pow(2, 20 * t - 10) * Math.sin((20 * t - 11.125) * c5)) / 2 : (Math.pow(2, -20 * t + 10) * Math.sin((20 * t - 11.125) * c5)) / 2 + 1;
            },
            easeInBounce: t => 1 - this.easings.easeOutBounce(1 - t),
            easeOutBounce: t => {
                const n1 = 7.5625;
                const d1 = 2.75;
                if (t < 1 / d1) {
                    return n1 * t * t;
                } else if (t < 2 / d1) {
                    return n1 * (t -= 1.5 / d1) * t + 0.75;
                } else if (t < 2.5 / d1) {
                    return n1 * (t -= 2.25 / d1) * t + 0.9375;
                } else {
                    return n1 * (t -= 2.625 / d1) * t + 0.984375;
                }
            },
            easeInOutBounce: t => t < 0.5 ? (1 - this.easings.easeOutBounce(1 - 2 * t)) / 2 : (1 + this.easings.easeOutBounce(2 * t - 1)) / 2
        };
    }

    animate(from, to, duration, options = {}) {
        const easing = this.easings[options.easing || 'easeOutQuad'];
        const startTime = performance.now();
        const delay = options.delay || 0;
        const loop = options.loop || false;
        const yoyo = options.yoyo || false;
        const onUpdate = options.onUpdate || (() => {});
        const onComplete = options.onComplete || (() => {});
        const onRepeat = options.onRepeat || (() => {});

        const animation = {
            from,
            to,
            duration,
            easing,
            startTime: startTime + delay,
            delay,
            loop,
            yoyo,
            onUpdate,
            onComplete,
            onRepeat,
            completed: false,
            reversed: false
        };

        this.animations.push(animation);
        return animation;
    }

    tween(target, props, duration, options = {}) {
        const easing = this.easings[options.easing || 'easeOutQuad'];
        const startTime = performance.now() + (options.delay || 0);
        const startValues = {};
        const targetValues = {};
        const onUpdate = options.onUpdate || (() => {});
        const onComplete = options.onComplete || (() => {});

        Object.keys(props).forEach(key => {
            startValues[key] = target[key];
            targetValues[key] = props[key];
        });

        const tween = {
            target,
            startValues,
            targetValues,
            duration,
            easing,
            startTime,
            onUpdate,
            onComplete,
            completed: false
        };

        this.tweens.push(tween);
        return tween;
    }

    update() {
        const now = performance.now();

        // Update animations
        for (let i = this.animations.length - 1; i >= 0; i--) {
            const anim = this.animations[i];
            
            if (now < anim.startTime) continue;

            const elapsed = now - anim.startTime;
            let progress = Math.min(elapsed / anim.duration, 1);
            
            if (anim.easing) {
                progress = anim.easing(progress);
            }

            if (anim.yoyo && anim.reversed) {
                progress = 1 - progress;
            }

            const value = anim.from + (anim.to - anim.from) * progress;

            if (anim.onUpdate) {
                anim.onUpdate(value, progress);
            }

            if (progress >= 1) {
                if (anim.loop) {
                    if (anim.yoyo) {
                        anim.reversed = !anim.reversed;
                    }
                    anim.startTime = now;
                    if (anim.onRepeat) anim.onRepeat();
                } else {
                    anim.completed = true;
                    if (anim.onComplete) anim.onComplete();
                }
            }
        }

        // Update tweens
        for (let i = this.tweens.length - 1; i >= 0; i--) {
            const tween = this.tweens[i];
            
            if (now < tween.startTime) continue;

            const elapsed = now - tween.startTime;
            let progress = Math.min(elapsed / tween.duration, 1);
            
            if (tween.easing) {
                progress = tween.easing(progress);
            }

            Object.keys(tween.targetValues).forEach(key => {
                const start = tween.startValues[key];
                const end = tween.targetValues[key];
                tween.target[key] = start + (end - start) * progress;
            });

            if (tween.onUpdate) {
                tween.onUpdate(tween.target, progress);
            }

            if (progress >= 1) {
                tween.completed = true;
                if (tween.onComplete) tween.onComplete();
            }
        }

        // Clean up completed animations
        this.animations = this.animations.filter(a => !a.completed);
        this.tweens = this.tweens.filter(t => !t.completed);
    }

    stop(animation) {
        animation.completed = true;
    }

    stopAll() {
        this.animations.forEach(a => a.completed = true);
        this.tweens.forEach(t => t.completed = true);
    }
}

// ============================================================================
// CAMERA SYSTEM
// ============================================================================
class CameraSystem {
    constructor() {
        this.x = 0;
        this.y = 0;
        this.scale = 1;
        this.rotation = 0;
        this.target = null;
        this.shake = { x: 0, y: 0, intensity: 0, duration: 0, startTime: 0 };
        this.followSpeed = 0.1;
        this.bounds = null;
        this.smoothing = true;
    }

    setPosition(x, y, instant = false) {
        if (instant) {
            this.x = x;
            this.y = y;
        } else {
            this.target = { x, y };
        }
    }

    setScale(scale, instant = false) {
        if (instant) {
            this.scale = scale;
        } else {
            this.targetScale = scale;
        }
    }

    setRotation(rotation, instant = false) {
        if (instant) {
            this.rotation = rotation;
        } else {
            this.targetRotation = rotation;
        }
    }

    shakeScreen(intensity, duration) {
        this.shake = {
            intensity,
            duration,
            startTime: performance.now()
        };
    }

    follow(target, speed = 0.1) {
        this.target = target;
        this.followSpeed = speed;
    }

    setBounds(minX, minY, maxX, maxY) {
        this.bounds = { minX, minY, maxX, maxY };
    }

    update() {
        // Smooth follow
        if (this.target && this.smoothing) {
            this.x += (this.target.x - this.x) * this.followSpeed;
            this.y += (this.target.y - this.y) * this.followSpeed;
        } else if (this.target) {
            this.x = this.target.x;
            this.y = this.target.y;
        }

        // Smooth scale
        if (this.targetScale !== undefined) {
            this.scale += (this.targetScale - this.scale) * this.followSpeed;
            if (Math.abs(this.scale - this.targetScale) < 0.001) {
                this.scale = this.targetScale;
                this.targetScale = undefined;
            }
        }

        // Smooth rotation
        if (this.targetRotation !== undefined) {
            this.rotation += (this.targetRotation - this.rotation) * this.followSpeed;
            if (Math.abs(this.rotation - this.targetRotation) < 0.001) {
                this.rotation = this.targetRotation;
                this.targetRotation = undefined;
            }
        }

        // Apply bounds
        if (this.bounds) {
            this.x = Math.max(this.bounds.minX, Math.min(this.bounds.maxX, this.x));
            this.y = Math.max(this.bounds.minY, Math.min(this.bounds.maxY, this.y));
        }

        // Apply shake
        if (this.shake.duration > 0) {
            const elapsed = performance.now() - this.shake.startTime;
            if (elapsed < this.shake.duration) {
                const progress = elapsed / this.shake.duration;
                const currentIntensity = this.shake.intensity * (1 - progress);
                this.shake.x = (Math.random() - 0.5) * currentIntensity * 2;
                this.shake.y = (Math.random() - 0.5) * currentIntensity * 2;
            } else {
                this.shake.x = 0;
                this.shake.y = 0;
                this.shake.duration = 0;
            }
        }
    }

    getTransform() {
        return {
            x: this.x + this.shake.x,
            y: this.y + this.shake.y,
            scale: this.scale,
            rotation: this.rotation
        };
    }

    applyTransform(ctx) {
        const t = this.getTransform();
        ctx.translate(t.x, t.y);
        ctx.rotate(t.rotation);
        ctx.scale(t.scale, t.scale);
    }

    resetTransform(ctx) {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
    }
}

// ============================================================================
// EFFECTS SYSTEM - SCREEN EFFECTS, BLOOM, VIGNETTE, ETC.
// ============================================================================
class EffectsSystem {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.enabled = true;
        this.effects = {
            bloom: { enabled: true, intensity: 0.3, threshold: 0.8 },
            vignette: { enabled: true, intensity: 0.4, softness: 0.5 },
            chromaticAberration: { enabled: false, intensity: 2 },
            filmGrain: { enabled: false, intensity: 0.1 },
            colorGrade: { enabled: false, saturation: 1, brightness: 1, contrast: 1 },
            scanlines: { enabled: false, intensity: 0.1, count: 400 }
        };
        
        this.compositeCanvas = document.createElement('canvas');
        this.compositeCtx = this.compositeCanvas.getContext('2d');
        this.resize();
        
        window.addEventListener('resize', () => this.resize());
    }

    resize() {
        this.compositeCanvas.width = this.canvas.width;
        this.compositeCanvas.height = this.canvas.height;
    }

    applyEffects(sourceCanvas) {
        if (!this.enabled) return;

        const ctx = this.compositeCtx;
        ctx.clearRect(0, 0, this.compositeCanvas.width, this.compositeCanvas.height);
        
        // Draw original
        ctx.drawImage(sourceCanvas, 0, 0);

        // Apply bloom
        if (this.effects.bloom.enabled) {
            this.applyBloom(ctx, sourceCanvas);
        }

        // Apply vignette
        if (this.effects.vignette.enabled) {
            this.applyVignette(ctx);
        }

        // Apply chromatic aberration
        if (this.effects.chromaticAberration.enabled) {
            this.applyChromaticAberration(ctx, sourceCanvas);
        }

        // Apply film grain
        if (this.effects.filmGrain.enabled) {
            this.applyFilmGrain(ctx);
        }

        // Apply scanlines
        if (this.effects.scanlines.enabled) {
            this.applyScanlines(ctx);
        }

        // Apply color grading
        if (this.effects.colorGrade.enabled) {
            this.applyColorGrade(ctx);
        }

        // Draw composite to main canvas
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.ctx.drawImage(this.compositeCanvas, 0, 0);
    }

    applyBloom(ctx, source) {
        const { intensity, threshold } = this.effects.bloom;
        
        // Create bloom layers
        for (let i = 1; i <= 3; i++) {
            ctx.save();
            ctx.globalAlpha = intensity / i;
            ctx.filter = `blur(${i * 4}px)`;
            ctx.drawImage(source, 0, 0);
            ctx.restore();
        }
    }

    applyVignette(ctx) {
        const { intensity, softness } = this.effects.vignette;
        const w = this.canvas.width;
        const h = this.canvas.height;
        const cx = w / 2;
        const cy = h / 2;
        const radius = Math.sqrt(cx * cx + cy * cy);
        
        const gradient = ctx.createRadialGradient(cx, cy, radius * softness, cx, cy, radius);
        gradient.addColorStop(0, 'transparent');
        gradient.addColorStop(1, `rgba(0, 0, 0, ${intensity})`);
        
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, w, h);
    }

    applyChromaticAberration(ctx, source) {
        const { intensity } = this.effects.chromaticAberration;
        const w = this.canvas.width;
        const h = this.canvas.height;
        
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = 0.5;
        
        // Red channel offset
        ctx.filter = 'none';
        ctx.globalAlpha = 0.5;
        
        // Cyan channel offset
        ctx.filter = `translate(${-intensity}px, 0px)`;
        ctx.drawImage(source, 0, 0);
        
        ctx.restore();
    }

    applyFilmGrain(ctx) {
        const { intensity } = this.effects.filmGrain;
        const imageData = ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
        const data = imageData.data;
        
        for (let i = 0; i < data.length; i += 4) {
            const noise = (Math.random() - 0.5) * intensity * 255;
            data[i] = Math.max(0, Math.min(255, data[i] + noise));
            data[i + 1] = Math.max(0, Math.min(255, data[i + 1] + noise));
            data[i + 2] = Math.max(0, Math.min(255, data[i + 2] + noise));
        }
        
        ctx.putImageData(imageData, 0, 0);
    }

    applyScanlines(ctx) {
        const { intensity, count } = this.effects.scanlines;
        const h = this.canvas.height;
        const lineHeight = h / count;
        
        ctx.save();
        ctx.fillStyle = `rgba(0, 0, 0, ${intensity})`;
        
        for (let i = 0; i < count; i += 2) {
            ctx.fillRect(0, i * lineHeight, this.canvas.width, lineHeight);
        }
        
        ctx.restore();
    }

    applyColorGrade(ctx) {
        const { saturation, brightness, contrast } = this.effects.colorGrade;
        
        ctx.save();
        ctx.filter = `saturate(${saturation}) brightness(${brightness}) contrast(${contrast})`;
        ctx.drawImage(this.canvas, 0, 0);
        ctx.restore();
    }

    enableEffect(effectName) {
        if (this.effects[effectName]) {
            this.effects[effectName].enabled = true;
        }
    }

    disableEffect(effectName) {
        if (this.effects[effectName]) {
            this.effects[effectName].enabled = false;
        }
    }

    setEffectIntensity(effectName, property, value) {
        if (this.effects[effectName]) {
            this.effects[effectName][property] = value;
        }
    }
}

// ============================================================================
// EXTENDED PARTICLE SYSTEM - MORE PARTICLE TYPES
// ============================================================================
class ExtendedParticleSystem {
    constructor() {
        this.particles = [];
        this.emitters = [];
        this.maxParticles = 1000;
    }

    createEmitter(x, y, config = {}) {
        const emitter = {
            x, y,
            rate: config.rate || 10,
            burst: config.burst || false,
            burstCount: config.burstCount || 50,
            lifetime: config.lifetime || 2000,
            config: {
                colors: config.colors || ['#ffffff'],
                size: config.size || { min: 2, max: 5 },
                speed: config.speed || { min: 1, max: 3 },
                angle: config.angle || { min: 0, max: Math.PI * 2 },
                gravity: config.gravity || 0,
                friction: config.friction || 0.98,
                fade: config.fade !== undefined ? config.fade : true,
                sizeDecay: config.sizeDecay || 0.98,
                shape: config.shape || 'circle',
                ...config.config
            },
            active: true,
            lastEmit: 0
        };

        this.emitters.push(emitter);
        return emitter;
    }

    emit(x, y, config = {}) {
        if (this.particles.length >= this.maxParticles) return;

        const particle = {
            x,
            y,
            vx: config.vx || 0,
            vy: config.vy || 0,
            size: config.size || 5,
            color: config.color || '#ffffff',
            life: 1,
            decay: config.decay || 0.02,
            gravity: config.gravity || 0,
            friction: config.friction || 0.98,
            shape: config.shape || 'circle',
            rotation: config.rotation || 0,
            rotationSpeed: config.rotationSpeed || 0
        };

        this.particles.push(particle);
        return particle;
    }

    burst(x, y, count, config = {}) {
        for (let i = 0; i < count; i++) {
            const angle = config.angle !== undefined ? config.angle : Math.random() * Math.PI * 2;
            const speed = config.speed || (Math.random() * 5 + 2);
            const color = Array.isArray(config.colors) 
                ? config.colors[Math.floor(Math.random() * config.colors.length)]
                : config.colors || '#ffffff';

            this.emit(x, y, {
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                color,
                ...config
            });
        }
    }

    trail(x, y, config = {}) {
        const color = Array.isArray(config.colors) 
            ? config.colors[Math.floor(Math.random() * config.colors.length)]
            : config.colors || '#ffffff';

        this.emit(x, y, {
            vx: (Math.random() - 0.5) * 0.5,
            vy: -Math.random() * 2 - 1,
            color,
            size: config.size || 3,
            decay: config.decay || 0.01,
            gravity: -0.02,
            ...config
        });
    }

    wave(x, y, count, config = {}) {
        for (let i = 0; i < count; i++) {
            const angle = (i / count) * Math.PI * 2;
            const speed = config.speed || 3;
            const color = Array.isArray(config.colors) 
                ? config.colors[Math.floor(Math.random() * config.colors.length)]
                : config.colors || '#ffffff';

            this.emit(x, y, {
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                color,
                ...config
            });
        }
    }

    confetti(x, y, count, config = {}) {
        const colors = config.colors || ['#ff00aa', '#00f4ff', '#ffff00', '#00ff88', '#ff8800'];
        
        for (let i = 0; i < count; i++) {
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            this.emit(x, y, {
                vx: (Math.random() - 0.5) * 10,
                vy: -Math.random() * 10 - 5,
                color,
                size: Math.random() * 8 + 4,
                rotation: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.3,
                gravity: 0.15,
                friction: 0.99,
                shape: 'rect',
                decay: 0.005
            });
        }
    }

    fireworks(x, y, count, config = {}) {
        const colors = config.colors || ['#ff00aa', '#00f4ff', '#ffff00', '#00ff88'];
        
        for (let i = 0; i < count; i++) {
            const color = colors[Math.floor(Math.random() * colors.length)];
            const angle = (i / count) * Math.PI * 2;
            const speed = Math.random() * 4 + 2;

            this.emit(x, y, {
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                color,
                size: Math.random() * 3 + 2,
                gravity: 0.05,
                friction: 0.96,
                decay: 0.015,
                trail: true
            });
        }
    }

    update() {
        // Update emitters
        for (const emitter of this.emitters) {
            if (!emitter.active) continue;

            const now = performance.now();
            
            if (emitter.burst) {
                if (now - emitter.lastEmit > emitter.lifetime) {
                    this.burst(emitter.x, emitter.y, emitter.burstCount, emitter.config);
                    emitter.lastEmit = now;
                }
            } else {
                const emitCount = Math.floor(emitter.rate / 60);
                for (let i = 0; i < emitCount; i++) {
                    const angle = Math.random() * (emitter.config.angle.max - emitter.config.angle.min) + emitter.config.angle.min;
                    const speed = Math.random() * (emitter.config.speed.max - emitter.config.speed.min) + emitter.config.speed.min;
                    const size = Math.random() * (emitter.config.size.max - emitter.config.size.min) + emitter.config.size.min;
                    const color = emitter.config.colors[Math.floor(Math.random() * emitter.config.colors.length)];

                    this.emit(emitter.x, emitter.y, {
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        size,
                        color,
                        gravity: emitter.config.gravity,
                        friction: emitter.config.friction,
                        fade: emitter.config.fade,
                        sizeDecay: emitter.config.sizeDecay,
                        shape: emitter.config.shape
                    });
                }
            }
        }

        // Update particles
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            
            p.vy += p.gravity;
            p.vx *= p.friction;
            p.vy *= p.friction;
            
            p.x += p.vx;
            p.y += p.vy;
            
            if (p.rotationSpeed) {
                p.rotation += p.rotationSpeed;
            }
            
            p.life -= p.decay;
            if (p.sizeDecay) {
                p.size *= p.sizeDecay;
            }

            if (p.life <= 0 || p.size <= 0) {
                this.particles.splice(i, 1);
            }
        }
    }

    render(ctx) {
        for (const p of this.particles) {
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 10;

            if (p.rotation) {
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.translate(-p.x, -p.y);
            }

            switch (p.shape) {
                case 'circle':
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                    
                case 'rect':
                    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
                    break;
                    
                case 'star':
                    this.drawStar(ctx, p.x, p.y, 5, p.size, p.size / 2);
                    ctx.fill();
                    break;
                    
                case 'triangle':
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y - p.size);
                    ctx.lineTo(p.x + p.size, p.y + p.size);
                    ctx.lineTo(p.x - p.size, p.y + p.size);
                    ctx.closePath();
                    ctx.fill();
                    break;
                    
                case 'line':
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = p.size;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(p.x - p.vx * 2, p.y - p.vy * 2);
                    ctx.lineTo(p.x, p.y);
                    ctx.stroke();
                    break;
            }

            ctx.restore();
        }
    }

    drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
        let rot = Math.PI / 2 * 3;
        let x = cx;
        let y = cy;
        const step = Math.PI / spikes;

        ctx.beginPath();
        ctx.moveTo(cx, cy - outerRadius);

        for (let i = 0; i < spikes; i++) {
            x = cx + Math.cos(rot) * outerRadius;
            y = cy + Math.sin(rot) * outerRadius;
            ctx.lineTo(x, y);
            rot += step;

            x = cx + Math.cos(rot) * innerRadius;
            y = cy + Math.sin(rot) * innerRadius;
            ctx.lineTo(x, y);
            rot += step;
        }

        ctx.lineTo(cx, cy - outerRadius);
        ctx.closePath();
    }

    clear() {
        this.particles = [];
    }

    removeEmitter(emitter) {
        const index = this.emitters.indexOf(emitter);
        if (index > -1) {
            emitter.active = false;
            this.emitters.splice(index, 1);
        }
    }

    removeAllEmitters() {
        this.emitters.forEach(e => e.active = false);
        this.emitters = [];
    }
}

// ============================================================================
// COMBO EFFECTS SYSTEM
// ============================================================================
class ComboEffectsSystem {
    constructor(particles) {
        this.particles = particles;
        this.comboMilestones = [10, 25, 50, 100, 200, 300, 500, 750, 1000];
        this.currentMilestone = 0;
        this.comboFire = [];
    }

    onComboIncrease(combo, x, y) {
        // Check for milestone
        while (this.currentMilestone < this.comboMilestones.length &&
               combo >= this.comboMilestones[this.currentMilestone]) {
            this.triggerMilestoneEffect(this.comboMilestones[this.currentMilestone], x, y);
            this.currentMilestone++;
        }

        // Combo fire effect
        if (combo >= 10) {
            this.updateComboFire(combo, x, y);
        }
    }

    triggerMilestoneEffect(milestone, x, y) {
        const colors = this.getMilestoneColors(milestone);
        
        // Big burst
        this.particles.burst(x, y, milestone / 2, {
            colors,
            speed: 8,
            gravity: 0.1,
            size: 6,
            decay: 0.01
        });

        // Ring effect
        this.particles.wave(x, y, 20, {
            colors,
            speed: 5
        });

        // Confetti
        this.particles.confetti(x, y, milestone / 5, {
            colors
        });
    }

    getMilestoneColors(milestone) {
        if (milestone >= 1000) return ['#ff00aa', '#00f4ff', '#ffff00', '#ffffff'];
        if (milestone >= 500) return ['#ff00aa', '#00f4ff', '#ffff00'];
        if (milestone >= 100) return ['#00f4ff', '#00ff88', '#ffff00'];
        return ['#00f4ff', '#ffffff'];
    }

    updateComboFire(combo, x, y) {
        // Spawn trailing particles for high combos
        const intensity = Math.min(combo / 100, 1);
        
        if (Math.random() < intensity * 0.5) {
            this.particles.trail(x + (Math.random() - 0.5) * 100, y, {
                colors: ['#ff6600', '#ff3300', '#ffff00'],
                size: 3 + intensity * 5,
                decay: 0.02 + intensity * 0.02,
                gravity: -0.05
            });
        }
    }

    reset() {
        this.currentMilestone = 0;
        this.comboFire = [];
    }
}

// ============================================================================
// HIT EFFECTS SYSTEM
// ============================================================================
class HitEffectsSystem {
    constructor(particles) {
        this.particles = particles;
        this.trails = [];
        this.rings = [];
        this.slashes = [];
    }

    onHit(type, lane, receptorX, receptorY) {
        const colors = this.getHitColors(type);
        
        switch (type) {
            case 'perfect':
                this.perfectEffect(receptorX, receptorY, colors);
                break;
            case 'great':
                this.greatEffect(receptorX, receptorY, colors);
                break;
            case 'good':
                this.goodEffect(receptorX, receptorY, colors);
                break;
            case 'miss':
                this.missEffect(receptorX, receptorY);
                break;
        }
    }

    perfectEffect(x, y, colors) {
        // Triple burst
        this.particles.burst(x, y, 20, {
            colors,
            speed: 6,
            size: 4,
            gravity: 0.05,
            decay: 0.015
        });

        // Ring expansion
        this.rings.push({
            x, y,
            radius: 10,
            maxRadius: 80,
            color: colors[0],
            life: 1,
            decay: 0.04
        });

        // Star burst
        this.particles.wave(x, y, 8, {
            colors: ['#ffffff'],
            speed: 4,
            shape: 'star',
            size: 8
        });
    }

    greatEffect(x, y, colors) {
        // Double burst
        this.particles.burst(x, y, 12, {
            colors,
            speed: 4,
            size: 3,
            gravity: 0.03,
            decay: 0.02
        });

        // Small ring
        this.rings.push({
            x, y,
            radius: 8,
            maxRadius: 50,
            color: colors[0],
            life: 1,
            decay: 0.05
        });
    }

    goodEffect(x, y, colors) {
        // Single burst
        this.particles.burst(x, y, 6, {
            colors,
            speed: 3,
            size: 2,
            decay: 0.03
        });
    }

    missEffect(x, y) {
        // Red particles scatter
        this.particles.burst(x, y, 8, {
            colors: ['#ff3366'],
            speed: 2,
            size: 2,
            gravity: 0.1,
            decay: 0.04
        });

        // Fade ring
        this.rings.push({
            x, y,
            radius: 5,
            maxRadius: 30,
            color: '#ff3366',
            life: 1,
            decay: 0.06
        });
    }

    getHitColors(type) {
        switch (type) {
            case 'perfect': return ['#00f4ff', '#00ffaa', '#ffffff'];
            case 'great': return ['#00ff88', '#88ff88'];
            case 'good': return ['#ffff00', '#ffdd00'];
            case 'miss': return ['#ff3366', '#ff0044'];
            default: return ['#ffffff'];
        }
    }

    addTrail(x, y, color) {
        this.trails.push({
            points: [{ x, y, life: 1 }],
            color,
            maxLength: 10
        });
    }

    addSlash(x, y, direction, color) {
        this.slashes.push({
            x, y,
            direction,
            length: 50,
            life: 1,
            decay: 0.08,
            color
        });
    }

    update() {
        // Update rings
        for (let i = this.rings.length - 1; i >= 0; i--) {
            const ring = this.rings[i];
            ring.radius += (ring.maxRadius - ring.radius) * 0.2;
            ring.life -= ring.decay;
            
            if (ring.life <= 0) {
                this.rings.splice(i, 1);
            }
        }

        // Update trails
        for (let i = this.trails.length - 1; i >= 0; i--) {
            const trail = this.trails[i];
            
            for (let j = trail.points.length - 1; j >= 0; j--) {
                trail.points[j].life -= 0.1;
                if (trail.points[j].life <= 0) {
                    trail.points.splice(j, 1);
                }
            }
            
            if (trail.points.length === 0) {
                this.trails.splice(i, 1);
            }
        }

        // Update slashes
        for (let i = this.slashes.length - 1; i >= 0; i--) {
            const slash = this.slashes[i];
            slash.life -= slash.decay;
            
            if (slash.life <= 0) {
                this.slashes.splice(i, 1);
            }
        }
    }

    render(ctx) {
        // Render rings
        for (const ring of this.rings) {
            ctx.save();
            ctx.globalAlpha = ring.life;
            ctx.strokeStyle = ring.color;
            ctx.lineWidth = 3 * ring.life;
            ctx.shadowColor = ring.color;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(ring.x, ring.y, ring.radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        // Render trails
        for (const trail of this.trails) {
            if (trail.points.length < 2) continue;
            
            ctx.save();
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            for (let i = 1; i < trail.points.length; i++) {
                const p1 = trail.points[i - 1];
                const p2 = trail.points[i];
                
                ctx.beginPath();
                ctx.strokeStyle = trail.color;
                ctx.globalAlpha = p1.life * p2.life;
                ctx.lineWidth = 4 * p1.life;
                ctx.shadowColor = trail.color;
                ctx.shadowBlur = 5;
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }
            
            ctx.restore();
        }

        // Render slashes
        for (const slash of this.slashes) {
            ctx.save();
            ctx.translate(slash.x, slash.y);
            ctx.rotate(slash.direction);
            ctx.globalAlpha = slash.life;
            ctx.strokeStyle = slash.color;
            ctx.lineWidth = 4 * slash.life;
            ctx.shadowColor = slash.color;
            ctx.shadowBlur = 15;
            ctx.lineCap = 'round';
            
            ctx.beginPath();
            ctx.moveTo(-slash.length / 2, 0);
            ctx.lineTo(slash.length / 2, 0);
            ctx.stroke();
            
            ctx.restore();
        }
    }
}

// ============================================================================
// STAGE EFFECTS SYSTEM
// ============================================================================
class StageEffectsSystem {
    constructor(canvas, perspective) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.perspective = perspective;
        this.layers = [];
        this.ambientEffects = [];
        this.activeEffects = [];
    }

    setBackground(backgroundId) {
        const bgData = BACKGROUNDS_DATABASE.backgrounds[backgroundId];
        if (!bgData) return;

        this.layers = [];

        // Create layer for each background layer
        if (bgData.layers) {
            bgData.layers.forEach((layer, index) => {
                this.layers.push({
                    type: layer.type,
                    config: layer,
                    elements: [],
                    offset: { x: 0, y: 0 }
                });
            });
        }
    }

    addAmbientEffect(type, config) {
        const effect = {
            type,
            config,
            time: 0,
            active: true
        };

        this.ambientEffects.push(effect);
        return effect;
    }

    triggerStageEffect(type, config = {}) {
        const effect = {
            type,
            config,
            time: 0,
            duration: config.duration || 1000,
            active: true
        };

        this.activeEffects.push(effect);
    }

    update(deltaTime) {
        // Update ambient effects
        for (const effect of this.ambientEffects) {
            effect.time += deltaTime;
            this.updateAmbientEffect(effect);
        }

        // Update active effects
        for (let i = this.activeEffects.length - 1; i >= 0; i--) {
            const effect = this.activeEffects[i];
            effect.time += deltaTime;
            
            if (effect.time >= effect.duration) {
                effect.active = false;
                this.activeEffects.splice(i, 1);
            }
        }
    }

    updateAmbientEffect(effect) {
        switch (effect.type) {
            case 'pulse':
                effect.config.currentIntensity = 
                    (Math.sin(effect.time / effect.config.interval * Math.PI * 2) + 1) / 2;
                break;
            case 'wave':
                effect.config.offset = Math.sin(effect.time / 1000) * 10;
                break;
        }
    }

    renderBackground() {
        const ctx = this.ctx;
        const w = this.canvas.width;
        const h = this.canvas.height;

        // Base gradient
        const gradient = ctx.createLinearGradient(0, 0, 0, h);
        gradient.addColorStop(0, '#0a0a15');
        gradient.addColorStop(1, '#020208');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, w, h);

        // Render layers
        for (const layer of this.layers) {
            this.renderLayer(ctx, layer);
        }
    }

    renderLayer(ctx, layer) {
        switch (layer.type) {
            case 'stars':
                this.renderStars(ctx, layer);
                break;
            case 'particles':
                this.renderParticles(ctx, layer);
                break;
            case 'grid':
                this.renderGrid(ctx, layer);
                break;
            case 'glow_pools':
                this.renderGlowPools(ctx, layer);
                break;
            case 'cityscape':
                this.renderCityscape(ctx, layer);
                break;
        }
    }

    renderStars(ctx, layer) {
        const { count, color, speed, twinkle } = layer.config;
        
        for (let i = 0; i < count; i++) {
            const x = (i * 137.5) % this.canvas.width;
            const y = (i * 97.3) % (this.canvas.height * 0.6);
            const size = 1 + (i % 3);
            
            ctx.save();
            
            if (twinkle) {
                const twinkleVal = (Math.sin(this.perspective.horizonY + i + layer.time / 500) + 1) / 2;
                ctx.globalAlpha = 0.3 + twinkleVal * 0.7;
            }
            
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = size * 3;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    renderParticles(ctx, layer) {
        const { count, color, speed, size } = layer.config;
        
        for (let i = 0; i < count; i++) {
            const baseX = (i * 137.5) % this.canvas.width;
            const baseY = (i * 97.3) % this.canvas.height;
            const offset = Math.sin(layer.time / 1000 + i) * 20;
            
            const x = baseX + offset;
            const y = baseY + layer.time / 1000 * speed;
            
            ctx.save();
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = size * 2;
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            ctx.arc(x, y % this.canvas.height, size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    renderGrid(ctx, layer) {
        const { color, opacity } = layer.config;
        const w = this.canvas.width;
        const h = this.canvas.height;
        const hy = this.perspective.horizonY;
        
        ctx.save();
        ctx.strokeStyle = color;
        ctx.globalAlpha = opacity;
        ctx.lineWidth = 1;
        
        // Horizontal lines
        const lineCount = 20;
        for (let i = 1; i <= lineCount; i++) {
            const t = i / lineCount;
            const y = hy + (h - hy) * t;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(w, y);
            ctx.stroke();
        }
        
        // Vertical lines
        const vLines = 15;
        for (let i = 0; i <= vLines; i++) {
            const x = w * (i / vLines);
            ctx.beginPath();
            ctx.moveTo(x, hy);
            ctx.lineTo(x, h);
            ctx.stroke();
        }
        
        ctx.restore();
    }

    renderGlowPools(ctx, layer) {
        const { count, colors } = layer.config;
        const w = this.canvas.width;
        const h = this.canvas.height;
        
        for (let i = 0; i < count; i++) {
            const x = (i / count) * w + Math.sin(layer.time / 2000 + i) * 30;
            const y = h * 0.7 + Math.cos(layer.time / 3000 + i) * 20;
            const color = colors[i % colors.length];
            
            const gradient = ctx.createRadialGradient(x, y, 0, x, y, 100);
            gradient.addColorStop(0, color + '40');
            gradient.addColorStop(1, 'transparent');
            
            ctx.save();
            ctx.fillStyle = gradient;
            ctx.fillRect(x - 100, y - 100, 200, 200);
            ctx.restore();
        }
    }

    renderCityscape(ctx, layer) {
        const { color, height, buildings } = layer.config;
        const w = this.canvas.width;
        const h = this.canvas.height;
        const buildingHeight = h * height;
        
        ctx.save();
        ctx.fillStyle = color;
        
        for (let i = 0; i < buildings; i++) {
            const buildingW = 30 + Math.random() * 50;
            const buildingH = 50 + Math.random() * buildingHeight;
            const x = (i / buildings) * w + Math.random() * 20;
            const y = h - buildingH;
            
            ctx.fillRect(x, y, buildingW, buildingH);
            
            // Windows
            ctx.fillStyle = '#ffff00';
            for (let wy = y + 10; wy < h - 10; wy += 15) {
                for (let wx = x + 5; wx < x + buildingW - 10; wx += 12) {
                    if (Math.random() > 0.3) {
                        ctx.fillRect(wx, wy, 6, 8);
                    }
                }
            }
            ctx.fillStyle = color;
        }
        
        ctx.restore();
    }

    clear() {
        this.layers = [];
        this.ambientEffects = [];
        this.activeEffects = [];
    }
}

// ============================================================================
// STORY / CUTSCENE SYSTEM
// ============================================================================
class StorySystem {
    constructor() {
        this.scenes = {};
        this.currentScene = null;
        this.currentLine = 0;
        this.isPlaying = false;
        this.autoAdvance = false;
        this.autoAdvanceDelay = 3000;
        this.textSpeed = 50;
        this.callbacks = {
            sceneStart: [],
            sceneEnd: [],
            lineComplete: [],
            choice: []
        };
    }

    addScene(sceneId, sceneData) {
        this.scenes[sceneId] = sceneData;
    }

    playScene(sceneId) {
        const scene = this.scenes[sceneId];
        if (!scene) return;

        this.currentScene = scene;
        this.currentLine = 0;
        this.isPlaying = true;

        this.callbacks.sceneStart.forEach(cb => cb(scene));

        this.showLine(0);
    }

    showLine(lineIndex) {
        if (!this.currentScene || lineIndex >= this.currentScene.lines.length) {
            this.endScene();
            return;
        }

        const line = this.currentScene.lines[lineIndex];
        this.currentLine = lineIndex;

        // Show character name
        if (line.character) {
            // Update character display
        }

        // Show text with typewriter effect
        this.typewriterEffect(line.text, () => {
            this.callbacks.lineComplete.forEach(cb => cb(line));

            if (line.choices) {
                this.showChoices(line.choices);
            } else if (this.autoAdvance) {
                setTimeout(() => this.nextLine(), this.autoAdvanceDelay);
            }
        });
    }

    typewriterEffect(text, onComplete) {
        let currentChar = 0;
        const element = document.getElementById('storyText');

        const type = () => {
            if (currentChar < text.length) {
                element.textContent = text.substring(0, currentChar + 1);
                currentChar++;
                setTimeout(type, this.textSpeed);
            } else {
                onComplete();
            }
        };

        type();
    }

    showChoices(choices) {
        // Create choice UI
        const container = document.getElementById('storyChoices');
        container.innerHTML = '';
        container.style.display = 'flex';

        choices.forEach((choice, index) => {
            const btn = document.createElement('button');
            btn.className = 'story-choice-btn';
            btn.textContent = choice.text;
            btn.onclick = () => this.selectChoice(choice);
            container.appendChild(btn);
        });
    }

    selectChoice(choice) {
        document.getElementById('storyChoices').style.display = 'none';

        this.callbacks.choice.forEach(cb => cb(choice));

        if (choice.nextScene) {
            this.playScene(choice.nextScene);
        } else if (choice.nextLine !== undefined) {
            this.showLine(choice.nextLine);
        } else {
            this.nextLine();
        }
    }

    nextLine() {
        this.showLine(this.currentLine + 1);
    }

    previousLine() {
        if (this.currentLine > 0) {
            this.showLine(this.currentLine - 1);
        }
    }

    skipText() {
        // Skip to end of current line
    }

    endScene() {
        this.isPlaying = false;
        this.callbacks.sceneEnd.forEach(cb => cb(this.currentScene));
        this.currentScene = null;
    }

    on(event, callback) {
        if (this.callbacks[event]) {
            this.callbacks[event].push(callback);
        }
    }

    setAutoAdvance(enabled, delay) {
        this.autoAdvance = enabled;
        if (delay !== undefined) {
            this.autoAdvanceDelay = delay;
        }
    }

    setTextSpeed(speed) {
        this.textSpeed = speed;
    }

    // Story content examples
    createIntroStory() {
        this.addScene('intro', {
            lines: [
                {
                    character: 'Narrator',
                    text: 'Welcome to ARCADE, a world of rhythm and light...'
                },
                {
                    character: 'Lotoxic',
                    text: 'Ah, another traveler... Will you chase the light with me?'
                },
                {
                    character: 'You',
                    text: 'I seek the fragments of memory scattered across this world.',
                    choices: [
                        { text: 'Show me the way.', nextScene: 'tutorial' },
                        { text: 'Tell me more about this place.', nextLine: 3 }
                    ]
                },
                {
                    character: 'Lotoxic',
                    text: 'This world exists between dimensions. Music is the key to traversing its depths...'
                }
            ]
        });
    }
}
